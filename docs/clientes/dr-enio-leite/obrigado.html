    <style>
        :root {
            --gold: #C08B51;
            --gold-text: #7A5A2A;
            --cream: #F7F4EF;
            --ink: #15120D;
            --ink-lt: #3D3630;
            --mid: #82796E;
            --fd: 'Cormorant Garamond', Georgia, serif;
            --fb: 'DM Sans', system-ui, sans-serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--fb);
            background: var(--ink);
            color: var(--cream);
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            -webkit-font-smoothing: antialiased;
        }

        /* NAV */
        nav {
            padding: 1.5rem clamp(1.5rem, 5vw, 5rem);
            border-bottom: 1px solid rgba(192, 139, 81, 0.15);
        }

        .nav-logo-img {
            height: 36px;
            width: auto;
            display: block;
        }

        /* MAIN */
        main {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: clamp(3rem, 8vw, 6rem) clamp(1.5rem, 5vw, 5rem);
        }

        .card {
            text-align: center;
            max-width: 560px;
            width: 100%;
        }

        .icon {
            width: 64px;
            height: 64px;
            border: 1px solid rgba(192, 139, 81, 0.4);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 2rem;
            color: var(--gold);
            font-size: 1.5rem;
        }

        .label {
            font-family: var(--fb);
            font-size: 0.75rem;
            font-weight: 300;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 1.25rem;
        }

        h1 {
            font-family: var(--fd);
            font-size: clamp(2rem, 1.25rem + 3vw, 3.5rem);
            font-weight: 300;
            line-height: 1.1;
            letter-spacing: -0.01em;
            color: var(--cream);
            margin-bottom: 1.25rem;
        }

        h1 em {
            font-style: italic;
            color: var(--gold);
        }

        p {
            font-size: clamp(1rem, 0.95rem + 0.25vw, 1.125rem);
            color: rgba(247, 244, 239, 0.65);
            line-height: 1.65;
            margin-bottom: 2.5rem;
        }

        .divider {
            width: 48px;
            height: 1px;
            background: var(--gold);
            opacity: 0.35;
            margin: 0 auto 2.5rem;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 1rem 2rem;
            background: var(--gold);
            color: var(--ink);
            font-family: var(--fb);
            font-size: 0.875rem;
            font-weight: 500;
            letter-spacing: 0.04em;
            text-decoration: none;
            border-radius: 9999px;
            transition: background 0.2s;
        }

        .btn:hover { background: #A6733A; }

        .btn-ghost {
            background: transparent;
            color: rgba(247, 244, 239, 0.5);
            border: 1px solid rgba(247, 244, 239, 0.15);
            margin-top: 0.75rem;
        }

        .btn-ghost:hover {
            background: rgba(247, 244, 239, 0.05);
        }

        .actions {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0;
        }

        /* FOOTER */
        footer {
            padding: 1.5rem clamp(1.5rem, 5vw, 5rem);
            border-top: 1px solid rgba(192, 139, 81, 0.1);
            text-align: center;
        }

        footer p {
            font-size: 0.8125rem;
            color: rgba(247, 244, 239, 0.3);
            margin: 0;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <nav>
        <a href="/">
            <picture>
                <source srcset="logo-horizontal.webp" type="image/webp">
                <img src="logo-horizontal.png" alt="Dr. Enio Leite" class="nav-logo-img" width="1342" height="305">
            </picture>
        </a>
    </nav>

    <main>
        <div class="card">

            <div class="icon">✓</div>

            <p class="label">Solicitação recebida</p>

            <h1>Em breve, <em>nossa equipe<br>entrará em contato.</em></h1>

            <div class="divider"></div>

            <p>Você deu o primeiro passo. Nosso time vai analisar sua solicitação e entrar em contato pelo WhatsApp em breve.</p>

            <div class="actions">
                <a href="https://wa.me/5527996566104" class="btn" target="_blank" rel="noopener">
                    Falar pelo WhatsApp ↗
                </a>
                <a href="/" class="btn btn-ghost">
                    Voltar à página inicial
                </a>
            </div>

        </div>
    </main>

    <footer>
        <p>Instituto Enio Leite · Harmonização Orofacial · Serra, ES</p>
    </footer>

</body>
</html>
