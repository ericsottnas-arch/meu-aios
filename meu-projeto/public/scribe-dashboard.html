<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scribe Watcher Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-base: #030303;
      --bg-surface: #0a0a0a;
      --bg-elevated: #101013;
      --bg-overlay: #18181d;
      --border-faint: #141417;
      --border-subtle: #1e1e23;
      --border-base: #27272d;
      --border-strong: #35353c;
      --text-primary: #F0F0F5;
      --text-secondary: #8F8FA0;
      --text-muted: #505060;
      --accent: #C8FF00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --accent-glow: rgba(200, 255, 0, 0.22);
      --success: #22C55E;
      --success-bg: rgba(34, 197, 94, 0.10);
      --warning: #F59E0B;
      --warning-bg: rgba(245, 158, 11, 0.10);
      --danger: #EF4444;
      --danger-bg: rgba(239, 68, 68, 0.10);
      --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      --r-sm: 6px; --r-md: 8px; --r-lg: 12px;
      --ease-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 16px;
    }

    /* Header */
    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-base);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header-icon { font-size: 24px; }

    .header h1 {
      font-family: var(--font-display);
      font-size: 18px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .header-sub {
      font-size: 11px;
      color: var(--text-muted);
      font-family: var(--font-mono);
    }

    .status-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 12px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .status-idle { background: var(--accent-dim); color: var(--accent); border: 1px solid rgba(200,255,0,0.2); }
    .status-processing { background: var(--warning-bg); color: var(--warning); border: 1px solid rgba(245,158,11,0.2); }
    .status-error { background: var(--danger-bg); color: var(--danger); border: 1px solid rgba(239,68,68,0.2); }

    .pulse {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: currentColor;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* Cards grid */
    .cards {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 12px;
      margin: 20px 0;
    }

    .card {
      background: var(--bg-elevated);
      border: 1px solid var(--border-subtle);
      border-radius: var(--r-lg);
      padding: 16px;
    }

    .card-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }

    .card-value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-primary);
    }

    .card-value.accent { color: var(--accent); }
    .card-value.success { color: var(--success); }
    .card-value.warning { color: var(--warning); }
    .card-value.danger { color: var(--danger); }

    .card-sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* Actions */
    .actions {
      display: flex;
      gap: 8px;
      margin: 16px 0;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 16px;
      border-radius: var(--r-md);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid var(--border-base);
      background: var(--bg-elevated);
      color: var(--text-primary);
      transition: all var(--ease-base);
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .btn-primary {
      background: var(--accent);
      color: #000;
      border-color: var(--accent);
    }

    .btn-primary:hover { background: #d4ff33; }

    /* Table */
    .table-section {
      margin: 20px 0;
    }

    .table-title {
      font-family: var(--font-display);
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      color: var(--text-secondary);
    }

    table {
      width: 100%;
      border-collapse: collapse;
    }

    th {
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      padding: 8px 12px;
      border-bottom: 1px solid var(--border-base);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--border-faint);
      font-size: 12px;
      color: var(--text-secondary);
    }

    tr:hover td { background: var(--bg-overlay); }

    .badge-ok {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      background: var(--success-bg);
      color: var(--success);
    }

    .badge-fail {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      background: var(--danger-bg);
      color: var(--danger);
    }

    .mono { font-family: var(--font-mono); font-size: 11px; }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--text-muted);
      font-size: 13px;
    }

    .processing-name {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--warning);
      margin-top: 4px;
    }

    .last-scan {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <span class="header-icon">🎙️</span>
      <div>
        <h1>Scribe Watcher</h1>
        <span class="header-sub">port 3008 · cron 00:00 BRT</span>
      </div>
    </div>
    <div id="statusBadge" class="status-badge status-idle">
      <span class="pulse"></span>
      <span id="statusText">IDLE</span>
    </div>
  </div>

  <div class="container">
    <div class="cards">
      <div class="card">
        <div class="card-label">Total Gravacoes</div>
        <div class="card-value" id="totalRecordings">-</div>
        <div class="card-sub" id="totalSize">-</div>
      </div>
      <div class="card">
        <div class="card-label">Transcritas</div>
        <div class="card-value success" id="transcribed">-</div>
      </div>
      <div class="card">
        <div class="card-label">Pendentes</div>
        <div class="card-value warning" id="pending">-</div>
      </div>
      <div class="card">
        <div class="card-label">Erros</div>
        <div class="card-value danger" id="errors">-</div>
      </div>
      <div class="card">
        <div class="card-label">Scans Realizados</div>
        <div class="card-value accent" id="totalScans">-</div>
        <div class="card-sub last-scan" id="lastScan">-</div>
      </div>
    </div>

    <div id="processingInfo" style="display:none; margin-bottom: 16px;">
      <div class="card" style="border-color: rgba(245,158,11,0.3);">
        <div class="card-label">Processando agora</div>
        <div class="processing-name" id="currentRecording">-</div>
        <div class="card-sub">Queue: <span id="queueLen">0</span> restante(s)</div>
      </div>
    </div>

    <div class="actions">
      <button class="btn btn-primary" id="btnScan" onclick="triggerScan()">Scan Agora</button>
      <button class="btn" onclick="refreshData()">Atualizar</button>
    </div>

    <div class="table-section">
      <div class="table-title">Historico de Processamentos</div>
      <table>
        <thead>
          <tr>
            <th>Data</th>
            <th>Gravacao</th>
            <th>Cliente</th>
            <th>Status</th>
            <th>Detalhes</th>
          </tr>
        </thead>
        <tbody id="historyBody">
          <tr><td colspan="5" class="empty-state">Carregando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;

    async function fetchJSON(url) {
      const res = await fetch(API_BASE + url);
      return res.json();
    }

    async function refreshData() {
      try {
        const [status, stats] = await Promise.all([
          fetchJSON('/api/status'),
          fetchJSON('/api/stats'),
        ]);

        // Cards
        document.getElementById('totalRecordings').textContent = stats.total || 0;
        document.getElementById('totalSize').textContent = stats.totalSize || '-';
        document.getElementById('transcribed').textContent = stats.transcribed || 0;
        document.getElementById('pending').textContent = stats.pending || 0;
        document.getElementById('errors').textContent = status.stats?.totalErrors || 0;
        document.getElementById('totalScans').textContent = status.stats?.totalScans || 0;

        // Last scan
        if (status.lastScan) {
          const d = new Date(status.lastScan);
          document.getElementById('lastScan').textContent =
            'Ultimo: ' + d.toLocaleDateString('pt-BR') + ' ' + d.toLocaleTimeString('pt-BR');
        }

        // Status badge
        const badge = document.getElementById('statusBadge');
        const statusText = document.getElementById('statusText');
        badge.className = 'status-badge';

        if (status.isProcessing) {
          badge.classList.add('status-processing');
          statusText.textContent = 'PROCESSING';
          document.getElementById('processingInfo').style.display = 'block';
          document.getElementById('currentRecording').textContent = status.currentRecording || '-';
          document.getElementById('queueLen').textContent = status.queue?.length || 0;
          document.getElementById('btnScan').disabled = true;
        } else {
          badge.classList.add('status-idle');
          statusText.textContent = 'IDLE';
          document.getElementById('processingInfo').style.display = 'none';
          document.getElementById('btnScan').disabled = false;
        }

        // History table
        const history = status.history || [];
        const tbody = document.getElementById('historyBody');

        if (history.length === 0) {
          tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Nenhum processamento ainda</td></tr>';
        } else {
          tbody.innerHTML = history.slice(0, 20).map(h => {
            const date = new Date(h.timestamp);
            const dateStr = date.toLocaleDateString('pt-BR') + ' ' + date.toLocaleTimeString('pt-BR', { hour: '2-digit', minute: '2-digit' });
            const statusBadge = h.success
              ? '<span class="badge-ok">OK</span>'
              : '<span class="badge-fail">ERRO</span>';
            const details = h.success
              ? (h.filePath ? h.filePath.split('/').pop() : '-')
              : (h.error || '-');

            return `<tr>
              <td class="mono">${dateStr}</td>
              <td>${h.id || '-'}</td>
              <td>${h.client || '?'}</td>
              <td>${statusBadge}</td>
              <td class="mono" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${details}">${details}</td>
            </tr>`;
          }).join('');
        }
      } catch (err) {
        console.error('Refresh error:', err);
      }
    }

    async function triggerScan() {
      const btn = document.getElementById('btnScan');
      btn.disabled = true;
      btn.textContent = 'Scanning...';

      try {
        const res = await fetch(API_BASE + '/api/scan', { method: 'POST' });
        const data = await res.json();
        if (data.error) {
          alert(data.error);
        }
      } catch (err) {
        alert('Erro: ' + err.message);
      }

      btn.textContent = 'Scan Agora';
      setTimeout(refreshData, 2000);
    }

    // Initial load + auto-refresh
    refreshData();
    setInterval(refreshData, 30000);
  </script>
</body>
</html>
