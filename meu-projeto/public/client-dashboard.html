// CRM x ADS CROSS-REFERENCE
// ============================================================
function renderCrossref() {
  var d = STATE.crossrefData;
  if (!d || !d.hasData) {
    var syncHtml = '<div class="empty-state"><p>Sem dados de crossref. Sincronize o CRM e Meta Ads primeiro.</p>';
    syncHtml += '<button onclick="triggerSync()" style="margin-top:12px;padding:8px 20px;background:var(--primary);color:var(--background);border:none;border-radius:var(--radius);cursor:pointer;font-weight:600">Sincronizar Agora</button></div>';
    document.getElementById('page-crossref').innerHTML = syncHtml;
    return;
  }

  var k = d.kpis || {};
  var html = '';
  html += '<div class="page-header"><div><h1>CRM x Ads</h1><p>Cruzamento de dados do funil comercial com investimento em tráfego pago</p></div>';
  if (d.lastSync) {
    var syncTs = d.lastSync.at;
    if (syncTs && !syncTs.endsWith('Z') && !syncTs.includes('+')) syncTs += 'Z';
    html += '<div style="font-size:11px;color:var(--muted-foreground)"><i data-lucide="database" style="width:12px;height:12px;display:inline;vertical-align:middle"></i> Sync: ' + new Date(syncTs).toLocaleString('pt-BR', { timeZone: 'America/Sao_Paulo' }) + '</div>';
  }
  html += '</div>';

  // KPI Cards (6)
  html += '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">';
  html += statCard('Leads no CRM', fmtN(k.totalCrmLeads), 'Total de oportunidades', { icon: 'users' });
  html += statCard('Ganhos', fmtN(k.won30d), fmt(k.wonValue30d), { icon: 'trophy' });
  html += statCard('ROAS Real', k.roas ? k.roas.toFixed(2) + 'x' : '0x', 'Faturamento / Gasto Ads', { icon: 'trending-up', trend: k.roas >= 1 ? { value: (k.roas-1)*100, isPositive: true } : null });
  html += '</div>';
  html += '<div class="stats-grid" style="grid-template-columns:repeat(3,1fr)">';
  html += statCard('Taxa Conversão', k.conversionRate + '%', 'Ganhos / (Ganhos + Perdidos)', { icon: 'percent' });
  html += statCard('Consultas Agendadas', fmtN(k.consultasAgendadas), 'Leads que chegaram à consulta', { icon: 'calendar' });
  html += statCard('Custo por Consulta', fmt(k.custoConsulta), 'Gasto total / Consultas', { icon: 'dollar-sign' });
  html += '</div>';

  // Funnel
  if (d.funnel && d.funnel.length > 0) {
    var maxCount = Math.max.apply(null, d.funnel.map(function(s){return s.count;})) || 1;
    html += '<div class="section-card"><h3>Funil do Pipeline — ' + (d.pipelineName || 'Pipeline') + '</h3>';
    html += '<div style="display:flex;flex-direction:column;gap:8px;margin-top:16px">';
    d.funnel.forEach(function(s) {
      var pct = Math.max(5, (s.count / maxCount) * 100);
      html += '<div style="display:flex;align-items:center;gap:12px">';
      html += '<span style="min-width:140px;font-size:13px;color:var(--muted-foreground)">' + s.name + '</span>';
      html += '<div style="flex:1;height:28px;background:var(--muted);border-radius:4px;overflow:hidden;position:relative">';
      html += '<div style="width:' + pct + '%;height:100%;background:var(--gradient-gold);border-radius:4px;display:flex;align-items:center;padding:0 10px">';
      html += '<span style="font-size:12px;font-weight:600;color:var(--background)">' + s.count + '</span>';
      html += '</div></div>';
      if (s.value > 0) html += '<span style="min-width:90px;text-align:right;font-size:12px;color:var(--muted-foreground)">' + fmt(s.value) + '</span>';
      html += '</div>';
    });
    html += '</div></div>';
  }

  // Campaign ROI Table
  if (d.campaigns && d.campaigns.length > 0) {
    html += '<div class="section-card"><h3>Campanhas — ROI Real (Meta Ads x CRM)</h3>';
    html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Campanha</th><th class="text-right">Gasto</th><th class="text-right">CPL Meta</th>';
    html += '<th class="text-right">Leads CRM</th><th class="text-right">Open</th><th class="text-right">Won</th><th class="text-right">Lost</th>';
    html += '<th class="text-right">Faturado</th><th class="text-right">ROAS</th><th class="text-right">Lead Score</th><th class="text-right">Quality</th>';
    html += '</tr></thead><tbody>';
    d.campaigns.forEach(function(c) {
      var matchBadge = c.crmMatched ? '<span style="color:var(--green);font-size:10px" title="Match CRM encontrado">●</span> ' : '';
      var roasColor = c.roas >= 3 ? 'var(--green)' : c.roas >= 1 ? 'var(--primary)' : 'var(--red)';
      var qualityColor = c.quality >= 50 ? 'var(--green)' : c.quality >= 20 ? 'var(--primary)' : 'var(--muted-foreground)';
      html += '<tr>';
      html += '<td class="text-primary" style="max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + c.name + '">' + matchBadge + c.name + '</td>';
      html += '<td class="text-right">' + fmt(c.spend) + '</td>';
      html += '<td class="text-right">' + fmt(c.cplMeta) + '</td>';
      html += '<td class="text-right">' + c.crmLeads + '</td>';
      html += '<td class="text-right">' + c.crmOpen + '</td>';
      html += '<td class="text-right" style="color:var(--green)">' + c.crmWon + '</td>';
      html += '<td class="text-right" style="color:var(--red)">' + c.crmLost + '</td>';
      html += '<td class="text-right">' + fmt(c.crmWonValue) + '</td>';
      html += '<td class="text-right" style="color:' + roasColor + ';font-weight:600">' + c.roas.toFixed(2) + 'x</td>';
      // Lead Score badge
      var lsBadge = '-';
      if (c.avgLeadScore != null) {
        var lsColor = c.avgLeadScore >= 70 ? 'var(--green)' : c.avgLeadScore >= 40 ? 'var(--primary)' : 'var(--muted-foreground)';
        var lsTier = c.avgLeadScore >= 70 ? 'HOT' : c.avgLeadScore >= 40 ? 'WARM' : 'COLD';
        lsBadge = '<span style="background:' + lsColor + '22;color:' + lsColor + ';padding:2px 8px;border-radius:10px;font-size:11px;font-weight:600">' + c.avgLeadScore + ' ' + lsTier + '</span>';
      }
      html += '<td class="text-right">' + lsBadge + '</td>';
      html += '<td class="text-right" style="color:' + qualityColor + '">' + c.quality + '</td>';
      html += '</tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // Criativos + Conjuntos side by side
  var hasAds = d.ads && d.ads.length > 0;
  var hasAdsets = d.adsets && d.adsets.length > 0;
  if (hasAds || hasAdsets) {
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px">';
    // Criativos
    if (hasAds) {
      html += '<div class="section-card"><h3>Criativos x CRM</h3>';
      html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
      html += '<th>Criativo</th><th class="text-right">Gasto</th><th class="text-right">Leads CRM</th><th class="text-right">CPL CRM</th>';
      html += '</tr></thead><tbody>';
      d.ads.slice(0, 15).forEach(function(a) {
        html += '<tr><td class="text-primary" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + a.name + '">' + a.name + '</td>';
        html += '<td class="text-right">' + fmt(a.spend) + '</td>';
        html += '<td class="text-right">' + a.crmLeads + '</td>';
        html += '<td class="text-right">' + (a.cplCrm > 0 ? fmt(a.cplCrm) : '-') + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }
    // Conjuntos
    if (hasAdsets) {
      html += '<div class="section-card"><h3>Conjuntos x CRM</h3>';
      html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
      html += '<th>Conjunto</th><th class="text-right">Gasto</th><th class="text-right">Leads CRM</th><th class="text-right">CPL CRM</th>';
      html += '</tr></thead><tbody>';
      d.adsets.slice(0, 15).forEach(function(a) {
        html += '<tr><td class="text-primary" style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + a.name + '">' + a.name + '</td>';
        html += '<td class="text-right">' + fmt(a.spend) + '</td>';
        html += '<td class="text-right">' + a.crmLeads + '</td>';
        html += '<td class="text-right">' + (a.cplCrm > 0 ? fmt(a.cplCrm) : '-') + '</td></tr>';
      });
      html += '</tbody></table></div></div>';
    }
    html += '</div>';
  }

  // Lead Quality by Campaign (stacked bars HOT/WARM/COLD)
  var campaignsWithScores = (d.campaigns || []).filter(function(c) { return c.tierBreakdown; });
  if (campaignsWithScores.length > 0) {
    html += '<div class="section-card"><h3>Qualidade de Leads por Campanha</h3>';
    html += '<div style="display:flex;flex-direction:column;gap:10px;margin-top:16px">';
    campaignsWithScores.sort(function(a,b){ return (b.avgLeadScore||0) - (a.avgLeadScore||0); });
    campaignsWithScores.slice(0, 10).forEach(function(c) {
      var tb = c.tierBreakdown;
      var total = tb.hot + tb.warm + tb.cold;
      if (total === 0) return;
      var pHot = (tb.hot / total * 100).toFixed(1);
      var pWarm = (tb.warm / total * 100).toFixed(1);
      var pCold = (tb.cold / total * 100).toFixed(1);
      html += '<div style="display:flex;align-items:center;gap:12px">';
      html += '<span style="min-width:200px;font-size:12px;color:var(--foreground);overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + c.name + '">' + c.name + '</span>';
      html += '<div style="flex:1;height:24px;display:flex;border-radius:4px;overflow:hidden">';
      if (tb.hot > 0) html += '<div style="width:' + pHot + '%;background:#22c55e;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600">' + tb.hot + '</div>';
      if (tb.warm > 0) html += '<div style="width:' + pWarm + '%;background:#f59e0b;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600">' + tb.warm + '</div>';
      if (tb.cold > 0) html += '<div style="width:' + pCold + '%;background:#64748b;display:flex;align-items:center;justify-content:center;font-size:10px;color:#fff;font-weight:600">' + tb.cold + '</div>';
      html += '</div>';
      html += '<span style="min-width:50px;text-align:right;font-size:12px;font-weight:600;color:var(--foreground)">' + (c.avgLeadScore || 0) + '</span>';
      html += '</div>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:16px;margin-top:12px;font-size:11px;color:var(--muted-foreground)">';
    html += '<span><span style="display:inline-block;width:10px;height:10px;background:#22c55e;border-radius:2px;margin-right:4px"></span>HOT (70+)</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;background:#f59e0b;border-radius:2px;margin-right:4px"></span>WARM (40-69)</span>';
    html += '<span><span style="display:inline-block;width:10px;height:10px;background:#64748b;border-radius:2px;margin-right:4px"></span>COLD (&lt;40)</span>';
    html += '</div></div>';
  }

  // Rankings (3 columns)
  var hasQuality = d.qualityRanking && d.qualityRanking.length > 0;
  var hasEfficient = d.efficientAds && d.efficientAds.length > 0;
  var hasConsulta = d.consultaCampaigns && d.consultaCampaigns.length > 0;
  if (hasQuality || hasEfficient || hasConsulta) {
    html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;margin-top:16px">';
    // Quality Ranking
    html += '<div class="section-card"><h3 style="font-size:14px">Top Qualidade</h3><div style="margin-top:12px">';
    if (hasQuality) {
      d.qualityRanking.forEach(function(c, i) {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-subtle)">';
        html += '<span style="font-size:12px;color:var(--primary);font-weight:700;min-width:20px">#' + (i+1) + '</span>';
        html += '<span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + c.name + '">' + c.name + '</span>';
        html += '<span style="font-size:12px;font-weight:600;color:var(--green)">' + c.quality + '</span></div>';
      });
    } else { html += '<p style="font-size:12px;color:var(--muted-foreground)">Sem dados</p>'; }
    html += '</div></div>';

    // Efficient Ads
    html += '<div class="section-card"><h3 style="font-size:14px">Criativos + Eficientes</h3><div style="margin-top:12px">';
    if (hasEfficient) {
      d.efficientAds.forEach(function(a, i) {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-subtle)">';
        html += '<span style="font-size:12px;color:var(--primary);font-weight:700;min-width:20px">#' + (i+1) + '</span>';
        html += '<span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + a.name + '">' + a.name + '</span>';
        html += '<span style="font-size:12px;font-weight:600;color:var(--green)">' + fmt(a.cplCrm) + '</span></div>';
      });
    } else { html += '<p style="font-size:12px;color:var(--muted-foreground)">Sem dados</p>'; }
    html += '</div></div>';

    // Consulta Campaigns
    html += '<div class="section-card"><h3 style="font-size:14px">Geram Consultas</h3><div style="margin-top:12px">';
    if (hasConsulta) {
      d.consultaCampaigns.forEach(function(c, i) {
        html += '<div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border-subtle)">';
        html += '<span style="font-size:12px;color:var(--primary);font-weight:700;min-width:20px">#' + (i+1) + '</span>';
        html += '<span style="font-size:12px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="' + c.name + '">' + c.name + '</span>';
        html += '<span style="font-size:12px;font-weight:600;color:var(--green)">' + c.crmWon + ' ganhas</span></div>';
      });
    } else { html += '<p style="font-size:12px;color:var(--muted-foreground)">Sem dados</p>'; }
    html += '</div></div>';
    html += '</div>';
  }

  document.getElementById('page-crossref').innerHTML = html;
  lucide.createIcons();
}

function triggerSync() {
  var btn = event.target;
  btn.disabled = true;
  btn.textContent = 'Sincronizando...';
  fetch('/api/media/client/' + CLIENT_ID + '/sync', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      btn.textContent = 'Sync completo!';
      setTimeout(function() { loadAllData(); }, 1000);
    })
    .catch(function(err) {
      btn.textContent = 'Erro: ' + err.message;
      btn.disabled = false;
    });
}

function renderComercial() {
  var crm = STATE.crmData;
  if (!crm) { showEmpty('page-comercial', 'Sem dados comerciais. Verifique a integração GHL.'); return; }

  var recentLeads = crm.recentLeads || [];
  var campaignPerf = crm.campaignPerformance || [];

  var range = getDateRange();
  var hasDateFilter = range.start && range.end;

  // Recalculate conversions from opps data (already date-filtered if source=db)
  var conversions;
  if (STATE.oppsData && STATE.oppsData.opportunities && STATE.oppsData.opportunities.length > 0) {
    var oppsForStats = STATE.oppsData.opportunities;
    // If source is 'live', apply client-side date filter; if 'db', already filtered server-side
    if (hasDateFilter && STATE.oppsSource !== 'db') {
      oppsForStats = oppsForStats.filter(function(o) {
        var d = (o.createdAt || '').substring(0, 10);
        return d >= range.start && d <= range.end;
      });
    }
    var wonOpps = oppsForStats.filter(function(o) { return o.status === 'won'; });
    var lostOpps = oppsForStats.filter(function(o) { return o.status === 'lost'; });
    var openOpps = oppsForStats.filter(function(o) { return o.status === 'open'; });
    conversions = {
      totalWon: wonOpps.length,
      totalLost: lostOpps.length,
      totalOpen: openOpps.length,
      totalWonValue: wonOpps.reduce(function(s, o) { return s + (o.monetaryValue || 0); }, 0),
      total: oppsForStats.length
    };
  } else {
    conversions = crm.conversions || {};
  }

  // Apply date filter to recent leads
  if (hasDateFilter) {
    recentLeads = recentLeads.filter(function(l) {
      var d = (l.date || l.createdAt || l.dateAdded || '').substring(0, 10);
      return d >= range.start && d <= range.end;
    });
    // Rebuild campaign perf from opps by source
    var oppsForPerf = STATE.oppsData && STATE.oppsData.opportunities ? STATE.oppsData.opportunities : [];
    if (STATE.oppsSource !== 'db' && hasDateFilter) {
      oppsForPerf = oppsForPerf.filter(function(o) {
        var d = (o.createdAt || '').substring(0, 10);
        return d >= range.start && d <= range.end;
      });
    }
    if (oppsForPerf.length > 0) {
      var fOpps = oppsForPerf;
      // Rebuild campaign perf from filtered opps by source
      var campMap = {};
      fOpps.forEach(function(o) {
        var src = o.source || 'Direto';
        if (!campMap[src]) campMap[src] = { campaign: src, leads: 0, won: 0, lost: 0, wonValue: 0 };
        campMap[src].leads++;
        if (o.status === 'won') { campMap[src].won++; campMap[src].wonValue += (o.monetaryValue || 0); }
        if (o.status === 'lost') campMap[src].lost++;
      });
      var filteredPerf = Object.values(campMap).filter(function(c) { return c.leads > 0; });
      if (filteredPerf.length > 0) campaignPerf = filteredPerf;
    }
  }

  var html = '';
  html += '<div class="page-header"><div><h1>Comercial</h1><p>Visão de conversões e leads recentes</p></div></div>';

  // KPIs
  html += '<div class="stats-grid">';
  html += statCard('Total de Conversões', fmtN(conversions.totalWon || 0), 'Oportunidades ganhas', { icon: 'trophy' });
  html += statCard('Valor Total Ganho', fmt(conversions.totalWonValue || 0), 'Faturamento de ganhas', { icon: 'dollar-sign' });
  html += statCard('Leads Recentes', fmtN(recentLeads.length), 'Leads no período', { icon: 'users' });
  html += statCard('Campanhas com UTM', fmtN(campaignPerf.length), 'Campanhas rastreadas', { icon: 'megaphone' });
  html += '</div>';

  // Recent Leads Table
  if (recentLeads.length > 0) {
    html += '<div class="section-card"><h3>Leads Recentes</h3><div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Nome</th><th>Email</th><th>Telefone</th><th>Data</th><th>Fonte</th>';
    html += '</tr></thead><tbody>';
    recentLeads.slice(0, 20).forEach(function(l) {
      html += '<tr><td class="text-primary">' + (l.name || l.contactName || 'Sem nome') + '</td>';
      html += '<td>' + (l.email || '-') + '</td>';
      html += '<td>' + (l.phone || '-') + '</td>';
      html += '<td>' + (l.date || l.createdAt || l.dateAdded || '').substring(0, 10) + '</td>';
      html += '<td>' + (l.source || l.campaign || '-') + '</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  // Campaign Performance (UTM)
  if (campaignPerf.length > 0) {
    html += '<div class="section-card"><h3>Performance por Campanha (UTM)</h3><div style="overflow-x:auto"><table class="data-table"><thead><tr>';
    html += '<th>Campanha</th><th class="text-right">Leads</th><th class="text-right">Ganhas</th><th class="text-right">Perdidas</th><th class="text-right">Valor Ganho</th>';
    html += '</tr></thead><tbody>';
    campaignPerf.forEach(function(c) {
      html += '<tr><td class="text-primary">' + (c.campaign || c.utmCampaign || '-') + '</td>';
      html += '<td class="text-right">' + (c.leads || 0) + '</td>';
      html += '<td class="text-right">' + (c.won || 0) + '</td>';
      html += '<td class="text-right">' + (c.lost || 0) + '</td>';
      html += '<td class="text-right">' + fmt(c.wonValue || 0) + '</td></tr>';
    });
    html += '</tbody></table></div></div>';
  }

  document.getElementById('page-comercial').innerHTML = html;
  lucide.createIcons();
}

// LEAD SCORING
// ============================================================
function loadLeadScores() {
  var page = document.getElementById('page-scoring');
  page.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Calculando scores...</p></div>';

  Promise.all([
    fetch('/api/media/client/' + CLIENT_ID + '/lead-scores/summary').then(function(r){return r.json();}),
    fetch('/api/media/client/' + CLIENT_ID + '/lead-scores/distribution').then(function(r){return r.json();}),
    fetch('/api/media/client/' + CLIENT_ID + '/lead-scores?limit=100').then(function(r){return r.json();})
  ]).then(function(results) {
    var summary = results[0];
    var distribution = results[1];
    var leads = results[2];
    STATE.scoringData = { summary: summary, distribution: distribution, leads: leads.data || [] };
    renderLeadScoring();
  }).catch(function(err) {
    page.innerHTML = '<div class="empty-state"><p>Erro ao carregar lead scores: ' + err.message + '</p><button class="btn-recalculate" onclick="recalculateScores()">Calcular Scores</button></div>';
  });
}

function renderLeadScoring() {
  var d = STATE.scoringData;
  if (!d) return;
  var summary = d.summary;
  var distribution = d.distribution;
  var leads = d.leads;
  var html = '';

  // Header
  html += '<div class="page-header"><div><h1>Lead Scoring</h1><p>Scoring multidimensional: 6 dimensões que avaliam a qualidade de cada lead (0 a 100 pontos)</p></div>';
  html += '<button class="btn-recalculate" id="btn-recalculate" onclick="recalculateScores()"><i data-lucide="refresh-cw" style="width:14px;height:14px;display:inline-block;vertical-align:middle;margin-right:4px"></i> Recalcular</button></div>';

  // Legenda das dimensões
  html += '<div class="stat-card" style="margin-bottom:16px"><div class="stat-card-header"><span class="stat-card-title">O que cada dimensão mede</span></div>';
  html += '<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px 16px;padding:12px 0;font-size:12px">';
  html += '<div><strong style="color:var(--primary)">D1 — Resultado (0-30)</strong><br>Posição no funil comercial. Won=30, Consulta=22, Follow-up=12-18, Novo=8, Lost=3</div>';
  html += '<div><strong style="color:var(--primary)">D2 — Engajamento (0-25)</strong><br>Quantidade de mensagens <em>inbound</em> (do lead). Mais respostas = lead mais engajado</div>';
  html += '<div><strong style="color:var(--primary)">D3 — Velocidade (0-15)</strong><br>Tempo médio de resposta do lead. Responde em &lt;1h = 15pts, &gt;72h = 0pts</div>';
  html += '<div><strong style="color:var(--primary)">D4 — Recência (0-15)</strong><br>Dias desde última atividade. Hoje = 15pts, &gt;30 dias = 0pts</div>';
  html += '<div><strong style="color:var(--primary)">D5 — Qual. Campanha (0-10)</strong><br>Performance do anúncio que trouxe o lead (CTR acima da média +5, CPL abaixo +5)</div>';
  html += '<div><strong style="color:var(--primary)">D6 — Atribuição (0-5)</strong><br>Se tem UTM rastreável (+3) e se o ROAS da campanha é positivo (+2)</div>';
  html += '</div></div>';

  // KPI cards
  html += '<div class="stats-grid">';
  html += statCard('Score Médio', summary.avgScore || 0, 'de 100 pontos', { icon: 'gauge' });
  html += statCard('Leads HOT', fmtN(summary.byTier ? summary.byTier.hot : 0), 'Score 70+', { icon: 'flame' });
  html += statCard('Leads WARM', fmtN(summary.byTier ? summary.byTier.warm : 0), 'Score 40-69', { icon: 'thermometer' });
  html += statCard('Leads COLD', fmtN(summary.byTier ? summary.byTier.cold : 0), 'Score 0-39', { icon: 'snowflake' });
  html += '</div>';

  // Two-column layout: Distribution + Dimensions
  html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:24px">';

  // Distribution chart
  html += '<div class="stat-card"><div class="stat-card-header"><span class="stat-card-title">Distribuição de Scores</span></div><div style="padding:12px 0">';
  var ranges = distribution.ranges || [];
  var maxCount = Math.max.apply(null, ranges.map(function(r){return r.count;})) || 1;
  var distColors = ['hsl(210,50%,45%)', 'hsl(210,50%,55%)', 'hsl(50,80%,50%)', 'hsl(32,60%,50%)', 'hsl(0,62%,45%)'];
  for (var i = 0; i < ranges.length; i++) {
    var r = ranges[i];
    var pct = Math.round(r.count / maxCount * 100);
    html += '<div class="scoring-dist-bar">';
    html += '<div class="scoring-dist-label">' + r.label + '</div>';
    html += '<div class="scoring-dist-track"><div class="scoring-dist-fill" style="width:' + Math.max(pct, 5) + '%;background:' + distColors[i] + '">' + r.count + '</div></div>';
    html += '</div>';
  }
  html += '</div></div>';

  // Dimension averages
  html += '<div class="stat-card"><div class="stat-card-header"><span class="stat-card-title">Média por Dimensão</span></div><div style="padding:12px 0">';
  var dims = distribution.avgByDimension || {};
  var dimNames = [
    { key: 'd1', name: 'Resultado', max: 30, cls: 'd1' },
    { key: 'd2', name: 'Engajamento', max: 25, cls: 'd2' },
    { key: 'd3', name: 'Velocidade', max: 15, cls: 'd3' },
    { key: 'd4', name: 'Recência', max: 15, cls: 'd4' },
    { key: 'd5', name: 'Qual. Campanha', max: 10, cls: 'd5' },
    { key: 'd6', name: 'Atribuição', max: 5, cls: 'd6' },
  ];
  for (var j = 0; j < dimNames.length; j++) {
    var dm = dimNames[j];
    var val = dims[dm.key] || 0;
    var pctDim = Math.round(val / dm.max * 100);
    html += '<div class="scoring-dim-row">';
    html += '<div class="scoring-dim-name">' + dm.name + '</div>';
    html += '<div style="flex:1"><div class="dim-bar"><div class="dim-bar-fill ' + dm.cls + '" style="width:' + pctDim + '%"></div></div></div>';
    html += '<div class="scoring-dim-value">' + val + '/' + dm.max + '</div>';
    html += '</div>';
  }
  html += '</div></div>';
  html += '</div>'; // end grid

  // Leads table
  html += '<div class="stat-card"><div class="stat-card-header"><span class="stat-card-title">Leads (' + (leads.length || 0) + ')</span></div>';
  html += '<div style="overflow-x:auto"><table class="data-table"><thead><tr>';
  html += '<th>Nome</th><th class="text-right">Score</th><th>Tier</th><th>Status</th><th>Estágio</th>';
  html += '<th class="text-right" title="Mensagens trocadas (inbound / outbound)" style="cursor:help">Msgs</th>';
  html += '<th class="text-right" title="D1: Resultado no funil (0-30). Won=30, Consulta=22, Novo=8, Lost=3" style="cursor:help">D1</th>';
  html += '<th class="text-right" title="D2: Engajamento de mensagens inbound (0-25). Mais respostas = mais pontos" style="cursor:help">D2</th>';
  html += '<th class="text-right" title="D3: Velocidade de resposta do lead (0-15). <1h=15, >72h=0" style="cursor:help">D3</th>';
  html += '<th class="text-right" title="D4: Recência - dias desde última atividade (0-15). Hoje=15, >30d=0" style="cursor:help">D4</th>';
  html += '<th class="text-right" title="D5: Qualidade da campanha que trouxe o lead (0-10)" style="cursor:help">D5</th>';
  html += '<th class="text-right" title="D6: Atribuição - rastreabilidade UTM e ROAS (0-5)" style="cursor:help">D6</th>';
  html += '<th>Campanha</th></tr></thead><tbody>';

  var sortedLeads = (leads || []).slice().sort(function(a,b){ return (b.score || 0) - (a.score || 0); });
  for (var k = 0; k < sortedLeads.length; k++) {
    var l = sortedLeads[k];
    var tierCls = l.tier === 'hot' ? 'tier-hot' : l.tier === 'warm' ? 'tier-warm' : 'tier-cold';
    var tierLabel = (l.tier || 'cold').toUpperCase();
    var d2Val = l.d2_engagement != null ? l.d2_engagement : (l.dimensions ? l.dimensions.d2 : 0);
    var d3Val = l.d3_velocity != null ? l.d3_velocity : (l.dimensions ? l.dimensions.d3 : 0);
    var msgCount = l.message_count || l.messageCount || 0;
    var inCount = l.inbound_count || l.inboundCount || 0;
    var outCount = l.outbound_count || l.outboundCount || 0;
    var noMsgs = (msgCount === 0);
    var statusStr = (l.status || '-');
    var statusColor = statusStr === 'won' ? 'color:var(--green);font-weight:600' : statusStr === 'lost' ? 'color:var(--red)' : '';
    html += '<tr>';
    html += '<td class="text-primary">' + (l.contact_name || l.contactName || '-') + '</td>';
    html += '<td class="text-right" style="font-weight:700">' + (l.score || 0) + '</td>';
    html += '<td><span class="tier-badge ' + tierCls + '">' + tierLabel + '</span></td>';
    html += '<td style="' + statusColor + '">' + statusStr + '</td>';
    html += '<td>' + (l.stage_name || l.stageName || '-') + '</td>';
    // Coluna Msgs: total (inbound/outbound)
    if (noMsgs) {
      html += '<td class="text-right" title="Nenhuma conversa encontrada no GHL para este lead" style="color:var(--muted-foreground);cursor:help">—</td>';
    } else {
      html += '<td class="text-right" title="' + inCount + ' recebidas / ' + outCount + ' enviadas" style="cursor:help">' + msgCount + ' <span style="font-size:10px;color:var(--muted-foreground)">(' + inCount + '/' + outCount + ')</span></td>';
    }
    html += '<td class="text-right">' + (l.d1_engagement != null ? l.d1_engagement : (l.dimensions ? l.dimensions.d1 : 0)) + '</td>';
    html += '<td class="text-right"' + (noMsgs ? ' title="Sem conversas no GHL — D2 zerado" style="color:var(--muted-foreground)"' : '') + '>' + d2Val + '</td>';
    html += '<td class="text-right"' + (noMsgs ? ' title="Sem conversas no GHL — D3 zerado" style="color:var(--muted-foreground)"' : '') + '>' + d3Val + '</td>';
    html += '<td class="text-right">' + (l.d4_recency != null ? l.d4_recency : (l.dimensions ? l.dimensions.d4 : 0)) + '</td>';
    html += '<td class="text-right">' + (l.d5_targeting != null ? l.d5_targeting : (l.dimensions ? l.dimensions.d5 : 0)) + '</td>';
    html += '<td class="text-right">' + (l.d6_attribution != null ? l.d6_attribution : (l.dimensions ? l.dimensions.d6 : 0)) + '</td>';
    html += '<td style="max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + (l.utm_campaign || l.utmCampaign || '-') + '</td>';
    html += '</tr>';
  }

  if (sortedLeads.length === 0) {
    html += '<tr><td colspan="13" style="text-align:center;padding:24px;color:var(--muted-foreground)">Nenhum lead scored. Clique em "Recalcular" para gerar scores.</td></tr>';
  }

  html += '</tbody></table></div></div>';

  document.getElementById('page-scoring').innerHTML = html;
  lucide.createIcons();
}

function recalculateScores() {
  var btn = document.getElementById('btn-recalculate');
  if (btn) { btn.disabled = true; btn.textContent = 'Calculando...'; }

  fetch('/api/media/client/' + CLIENT_ID + '/lead-scores/recalculate', { method: 'POST' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.success) {
        STATE.scoringData = null;
        loadLeadScores();
      } else {
        alert('Erro: ' + (data.error || 'Falha ao recalcular'));
        if (btn) { btn.disabled = false; btn.textContent = 'Recalcular'; }
      }
    })
    .catch(function(err) {
      alert('Erro: ' + err.message);
      if (btn) { btn.disabled = false; btn.textContent = 'Recalcular'; }
    });
}
