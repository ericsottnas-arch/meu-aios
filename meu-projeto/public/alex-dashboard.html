<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Alex — Contatos & Clientes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg-base: #030303;
      --bg-surface: #0a0a0a;
      --bg-elevated: #101013;
      --bg-overlay: #18181d;
      --border-faint: #141417;
      --border-subtle: #1e1e23;
      --border-base: #27272d;
      --border-strong: #35353c;
      --text-primary: #F0F0F5;
      --text-secondary: #8F8FA0;
      --text-muted: #505060;
      --accent: #C8FF00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --accent-glow: rgba(200, 255, 0, 0.22);
      --success: #22C55E;
      --warning: #F59E0B;
      --danger: #EF4444;
      --font-display: 'Space Grotesk', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 13px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border-base);
    }

    .header-left h1 {
      font-family: var(--font-display);
      font-size: 20px;
      font-weight: 600;
    }

    .header-left h1 span { color: var(--accent); }

    .header-left p {
      font-size: 12px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .live-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: 8px;
      padding: 16px;
    }

    .stat-card .label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      margin-bottom: 6px;
    }

    .stat-card .value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      color: var(--accent);
    }

    .stat-card .sub {
      font-size: 11px;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    .search-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .search-bar input {
      flex: 1;
      padding: 10px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: 6px;
      color: var(--text-primary);
      font-family: var(--font-body);
      font-size: 13px;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-bar input:focus {
      border-color: var(--accent);
    }

    .search-bar input::placeholder {
      color: var(--text-muted);
    }

    .filter-btn {
      padding: 8px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-base);
      border-radius: 6px;
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 12px;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--accent-dim);
      border-color: var(--accent);
      color: var(--text-primary);
    }

    .contacts-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: 8px;
      overflow: hidden;
    }

    .contacts-table thead th {
      background: var(--bg-elevated);
      padding: 10px 14px;
      text-align: left;
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border-base);
    }

    .contacts-table tbody tr {
      transition: background 0.15s;
      border-bottom: 1px solid var(--border-faint);
    }

    .contacts-table tbody tr:hover {
      background: var(--accent-dim);
    }

    .contacts-table tbody tr:last-child {
      border-bottom: none;
    }

    .contacts-table td {
      padding: 10px 14px;
      font-size: 12px;
      vertical-align: middle;
    }

    .contact-name {
      font-weight: 600;
      color: var(--text-primary);
    }

    .contact-role {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-family: var(--font-mono);
    }

    .role-client {
      background: rgba(200, 255, 0, 0.1);
      color: var(--accent);
      border: 1px solid rgba(200, 255, 0, 0.25);
    }

    .role-contact {
      background: rgba(91, 141, 239, 0.1);
      color: #5B8DEF;
      border: 1px solid rgba(91, 141, 239, 0.25);
    }

    .role-team {
      background: rgba(34, 197, 94, 0.1);
      color: var(--success);
      border: 1px solid rgba(34, 197, 94, 0.25);
    }

    .contact-link {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.15s;
    }

    .contact-link:hover {
      color: var(--accent);
    }

    .empty-field {
      color: var(--text-muted);
      font-style: italic;
    }

    .client-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }

    .client-tag {
      padding: 2px 8px;
      background: var(--bg-overlay);
      border: 1px solid var(--border-subtle);
      border-radius: 4px;
      font-size: 10px;
      color: var(--text-secondary);
    }

    .last-update {
      font-size: 11px;
      color: var(--text-muted);
    }

    .footer {
      margin-top: 24px;
      padding-top: 16px;
      border-top: 1px solid var(--border-base);
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .contacts-table { font-size: 11px; }
      .contacts-table td, .contacts-table th { padding: 8px; }
      .stats-row { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-left">
        <h1><span>Alex</span> — Contatos & Clientes</h1>
        <p>Base de contatos sincronizada em tempo real</p>
      </div>
      <div class="header-right">
        <div class="live-dot"></div>
        <span class="last-update" id="lastUpdate">Carregando...</span>
      </div>
    </div>

    <div class="stats-row" id="statsRow">
      <div class="stat-card">
        <div class="label">Total Contatos</div>
        <div class="value" id="totalContacts">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Clientes</div>
        <div class="value" id="totalClients">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Com Email</div>
        <div class="value" id="totalEmails">—</div>
      </div>
      <div class="stat-card">
        <div class="label">Com Instagram</div>
        <div class="value" id="totalInstagrams">—</div>
      </div>
    </div>

    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Buscar contato por nome, email ou Instagram..." />
      <button class="filter-btn active" data-filter="all" onclick="setFilter('all')">Todos</button>
      <button class="filter-btn" data-filter="client" onclick="setFilter('client')">Clientes</button>
      <button class="filter-btn" data-filter="contact" onclick="setFilter('contact')">Contatos</button>
      <button class="filter-btn" data-filter="team" onclick="setFilter('team')">Equipe</button>
    </div>

    <table class="contacts-table">
      <thead>
        <tr>
          <th>Nome</th>
          <th>Email</th>
          <th>Telefone</th>
          <th>Instagram</th>
          <th>Tipo</th>
          <th>Clientes</th>
        </tr>
      </thead>
      <tbody id="contactsBody"></tbody>
    </table>

    <div class="footer">
      <span id="footerInfo">—</span>
      <span id="footerTime">—</span>
    </div>
  </div>

  <script>
    let allContacts = [];
    let currentFilter = 'all';

    async function loadContacts() {
      try {
        const res = await fetch('/api/contacts');
        const data = await res.json();
        allContacts = data.contacts || [];
        updateStats();
        renderTable();
        document.getElementById('lastUpdate').textContent =
          'Atualizado ' + new Date().toLocaleTimeString('pt-BR');
        document.getElementById('footerTime').textContent =
          new Date().toLocaleString('pt-BR');
      } catch (err) {
        console.error('Erro ao carregar contatos:', err);
      }
    }

    function updateStats() {
      const c = allContacts;
      document.getElementById('totalContacts').textContent = c.length;
      document.getElementById('totalClients').textContent = c.filter(x => x.role === 'client').length;
      document.getElementById('totalEmails').textContent = c.filter(x => x.email).length;
      document.getElementById('totalInstagrams').textContent = c.filter(x => x.instagram).length;
    }

    function setFilter(filter) {
      currentFilter = filter;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.filter === filter);
      });
      renderTable();
    }

    function renderTable() {
      const query = document.getElementById('searchInput').value.toLowerCase().trim();
      let filtered = allContacts;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(c => c.role === currentFilter);
      }

      if (query) {
        filtered = filtered.filter(c =>
          (c.name || '').toLowerCase().includes(query) ||
          (c.email || '').toLowerCase().includes(query) ||
          (c.instagram || '').toLowerCase().includes(query) ||
          (c.phone || '').includes(query) ||
          (c.clients || '').toLowerCase().includes(query)
        );
      }

      const tbody = document.getElementById('contactsBody');
      if (filtered.length === 0) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:var(--text-muted);padding:24px;">Nenhum contato encontrado</td></tr>';
        document.getElementById('footerInfo').textContent = '0 contatos';
        return;
      }

      tbody.innerHTML = filtered.map(c => `
        <tr>
          <td><span class="contact-name">${esc(c.name)}</span></td>
          <td>${c.email
            ? `<a href="mailto:${esc(c.email)}" class="contact-link">${esc(c.email)}</a>`
            : '<span class="empty-field">—</span>'}</td>
          <td>${c.phone
            ? `<span class="contact-link">${formatPhone(c.phone)}</span>`
            : '<span class="empty-field">—</span>'}</td>
          <td>${c.instagram
            ? `<a href="${igUrl(c.instagram)}" target="_blank" class="contact-link">${esc(c.instagram)}</a>`
            : '<span class="empty-field">—</span>'}</td>
          <td><span class="contact-role role-${c.role || 'contact'}">${c.role || 'contact'}</span></td>
          <td>${c.clients
            ? `<div class="client-tags">${c.clients.split(', ').map(cl => `<span class="client-tag">${esc(cl)}</span>`).join('')}</div>`
            : '<span class="empty-field">—</span>'}</td>
        </tr>
      `).join('');

      document.getElementById('footerInfo').textContent = `${filtered.length} contato${filtered.length !== 1 ? 's' : ''}`;
    }

    function esc(s) {
      if (!s) return '';
      const d = document.createElement('div');
      d.textContent = s;
      return d.innerHTML;
    }

    function formatPhone(p) {
      if (!p) return '';
      const d = p.replace(/\D/g, '');
      if (d.length === 13 && d.startsWith('55')) {
        return `+${d.slice(0,2)} (${d.slice(2,4)}) ${d.slice(4,9)}-${d.slice(9)}`;
      }
      return p;
    }

    function igUrl(ig) {
      if (!ig) return '#';
      if (ig.startsWith('http')) return ig;
      const handle = ig.replace('@', '');
      return `https://instagram.com/${handle}`;
    }

    // Search com debounce
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', () => {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(renderTable, 200);
    });

    // Carregar e atualizar a cada 5s
    loadContacts();
    setInterval(loadContacts, 5000);
  </script>
</body>
</html>
