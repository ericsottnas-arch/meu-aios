<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Content Radar — Syra Digital</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #1a1a2e, #16213e); padding: 20px 30px; border-bottom: 1px solid #333; display: flex; justify-content: space-between; align-items: center; }
    .header h1 { font-size: 1.4em; color: #fff; }
    .header h1 span { color: #00d4aa; }
    .header-actions { display: flex; gap: 10px; }
    .btn { padding: 8px 16px; border: none; border-radius: 6px; cursor: pointer; font-size: 0.85em; font-weight: 600; transition: all 0.2s; }
    .btn-primary { background: #00d4aa; color: #0a0a0a; }
    .btn-primary:hover { background: #00f5c4; }
    .btn-secondary { background: #333; color: #ccc; }
    .btn-secondary:hover { background: #444; }
    .btn-danger { background: #ff4757; color: #fff; }
    .btn-sm { padding: 4px 10px; font-size: 0.75em; }

    .stats-bar { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; padding: 20px 30px; }
    .stat-card { background: #1a1a2e; border: 1px solid #333; border-radius: 10px; padding: 15px; text-align: center; }
    .stat-card .value { font-size: 2em; font-weight: 700; color: #00d4aa; }
    .stat-card .label { font-size: 0.8em; color: #888; margin-top: 4px; }

    .controls { padding: 15px 30px; display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .filter-btn { padding: 6px 14px; border: 1px solid #333; background: transparent; color: #888; border-radius: 20px; cursor: pointer; font-size: 0.8em; transition: all 0.2s; }
    .filter-btn.active { border-color: #00d4aa; color: #00d4aa; background: rgba(0,212,170,0.1); }
    .filter-btn:hover { border-color: #00d4aa; color: #00d4aa; }

    .items-grid { padding: 15px 30px; display: grid; gap: 12px; }
    .item-card { background: #1a1a2e; border: 1px solid #262640; border-radius: 10px; padding: 16px; transition: border-color 0.2s; }
    .item-card:hover { border-color: #00d4aa; }
    .item-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
    .item-source { display: flex; align-items: center; gap: 8px; }
    .source-badge { padding: 3px 8px; border-radius: 4px; font-size: 0.7em; font-weight: 600; text-transform: uppercase; }
    .source-badge.profile_watcher { background: #4834d4; color: #fff; }
    .source-badge.niche_scanner { background: #e17055; color: #fff; }
    .source-badge.trending_radar { background: #00b894; color: #fff; }
    .item-username { font-size: 0.85em; color: #888; }
    .item-score { display: flex; align-items: center; gap: 6px; }
    .score-badge { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85em; }
    .score-high { background: rgba(0,212,170,0.2); color: #00d4aa; }
    .score-mid { background: rgba(255,165,0,0.2); color: #ffa500; }
    .score-low { background: rgba(255,71,87,0.2); color: #ff4757; }
    .item-title { font-size: 1em; font-weight: 600; color: #fff; margin-bottom: 6px; }
    .item-title a { color: inherit; text-decoration: none; }
    .item-title a:hover { color: #00d4aa; }
    .item-meta { display: flex; gap: 12px; font-size: 0.8em; color: #666; margin-bottom: 8px; flex-wrap: wrap; }
    .item-angle { background: #1e1e3a; border: 1px solid #333; border-radius: 6px; padding: 8px 12px; font-size: 0.85em; color: #aaa; }
    .item-actions { display: flex; gap: 8px; margin-top: 10px; }
    .status-badge { padding: 2px 8px; border-radius: 4px; font-size: 0.7em; }
    .status-new { background: rgba(0,212,170,0.15); color: #00d4aa; }
    .status-notified { background: rgba(52,152,219,0.15); color: #3498db; }
    .status-saved { background: rgba(155,89,182,0.15); color: #9b59b6; }
    .status-used { background: rgba(46,204,113,0.15); color: #2ecc71; }
    .status-discarded { background: rgba(255,71,87,0.15); color: #ff4757; }

    .loading { text-align: center; padding: 60px; color: #666; }
    .empty { text-align: center; padding: 60px; color: #555; }
    .scan-running { background: #1a1a2e; border: 1px solid #00d4aa; border-radius: 8px; padding: 15px 30px; margin: 0 30px; display: none; align-items: center; gap: 10px; }
    .scan-running.active { display: flex; }
    .spinner { width: 18px; height: 18px; border: 2px solid #333; border-top-color: #00d4aa; border-radius: 50%; animation: spin 1s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🔍 Content <span>Radar</span></h1>
    <div class="header-actions">
      <button class="btn btn-secondary" onclick="scanNow('profiles')">👤 Scan Perfis</button>
      <button class="btn btn-secondary" onclick="scanNow('niche')">📰 Scan Nicho</button>
      <button class="btn btn-secondary" onclick="scanNow('trending')">📈 Scan Trending</button>
      <button class="btn btn-primary" onclick="scanNow('all')">🚀 Scan Completo</button>
    </div>
  </div>

  <div class="scan-running" id="scanStatus">
    <div class="spinner"></div>
    <span id="scanText">Escaneando...</span>
  </div>

  <div class="stats-bar" id="statsBar">
    <div class="stat-card"><div class="value" id="statTotal">-</div><div class="label">Total items</div></div>
    <div class="stat-card"><div class="value" id="statToday">-</div><div class="label">Hoje</div></div>
    <div class="stat-card"><div class="value" id="statProfiles">-</div><div class="label">Perfis monitorados</div></div>
    <div class="stat-card"><div class="value" id="statUsed">-</div><div class="label">Usados em conteudo</div></div>
    <div class="stat-card"><div class="value" id="statSaved">-</div><div class="label">Salvos</div></div>
  </div>

  <div class="controls">
    <span style="color:#666;font-size:0.85em;margin-right:10px;">Filtrar:</span>
    <button class="filter-btn active" data-filter="all">Todos</button>
    <button class="filter-btn" data-filter="profile_watcher">👤 Perfis</button>
    <button class="filter-btn" data-filter="niche_scanner">📰 Nicho</button>
    <button class="filter-btn" data-filter="trending_radar">📈 Trending</button>
    <span style="flex:1"></span>
    <button class="filter-btn" data-status="new">Novos</button>
    <button class="filter-btn" data-status="notified">Notificados</button>
    <button class="filter-btn" data-status="saved">Salvos</button>
    <button class="filter-btn" data-status="used">Usados</button>
  </div>

  <div class="items-grid" id="itemsGrid">
    <div class="loading">Carregando items...</div>
  </div>

  <script>
    let allItems = [];
    let currentFilter = 'all';
    let currentStatus = null;

    async function loadItems() {
      try {
        const res = await fetch('/api/radar/items?limit=200');
        const data = await res.json();
        allItems = data.items || [];
        renderItems();
      } catch (err) {
        document.getElementById('itemsGrid').innerHTML = `<div class="empty">Erro ao carregar: ${err.message}</div>`;
      }
    }

    async function loadStats() {
      try {
        const res = await fetch('/api/radar/stats');
        const data = await res.json();
        document.getElementById('statTotal').textContent = data.items?.total || 0;
        document.getElementById('statToday').textContent = data.items?.today || 0;
        document.getElementById('statProfiles').textContent = data.profiles?.length || 0;

        const byStatus = {};
        (data.items?.byStatus || []).forEach(s => byStatus[s.status] = s.cnt);
        document.getElementById('statUsed').textContent = byStatus.used || 0;
        document.getElementById('statSaved').textContent = byStatus.saved || 0;
      } catch {}
    }

    function renderItems() {
      const grid = document.getElementById('itemsGrid');
      let filtered = allItems;

      if (currentFilter !== 'all') {
        filtered = filtered.filter(i => i.source === currentFilter);
      }
      if (currentStatus) {
        filtered = filtered.filter(i => i.status === currentStatus);
      }

      if (!filtered.length) {
        grid.innerHTML = '<div class="empty">Nenhum item encontrado</div>';
        return;
      }

      grid.innerHTML = filtered.map(item => {
        const scoreClass = item.relevance_score >= 7 ? 'score-high' : item.relevance_score >= 5 ? 'score-mid' : 'score-low';
        const date = new Date(item.created_at).toLocaleDateString('pt-BR', { day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit' });

        return `
          <div class="item-card">
            <div class="item-header">
              <div class="item-source">
                <span class="source-badge ${item.source}">${sourceLabel(item.source)}</span>
                <span class="item-username">${item.source_username ? '@' + item.source_username : ''}</span>
                <span class="status-badge status-${item.status}">${item.status}</span>
              </div>
              <div class="item-score">
                <span class="score-badge ${scoreClass}">${item.relevance_score || '-'}</span>
              </div>
            </div>
            <div class="item-title">
              ${item.source_url ? `<a href="${item.source_url}" target="_blank">${escHtml(item.title || 'Sem titulo')}</a>` : escHtml(item.title || 'Sem titulo')}
            </div>
            <div class="item-meta">
              <span>📅 ${date}</span>
              ${item.engagement_rate ? `<span>📊 ${item.engagement_rate}% eng.</span>` : ''}
              ${item.suggested_format ? `<span>📐 ${item.suggested_format}</span>` : ''}
            </div>
            ${item.suggested_angle ? `<div class="item-angle">💡 ${escHtml(item.suggested_angle)}</div>` : ''}
            <div class="item-actions">
              ${item.status !== 'used' ? `<button class="btn btn-primary btn-sm" onclick="updateStatus(${item.id}, 'used')">✏️ Usar</button>` : ''}
              ${item.status !== 'saved' ? `<button class="btn btn-secondary btn-sm" onclick="updateStatus(${item.id}, 'saved')">📥 Salvar</button>` : ''}
              ${item.status !== 'discarded' ? `<button class="btn btn-danger btn-sm" onclick="updateStatus(${item.id}, 'discarded')">❌</button>` : ''}
            </div>
          </div>`;
      }).join('');
    }

    function sourceLabel(source) {
      const labels = { profile_watcher: 'Perfil', niche_scanner: 'Nicho', trending_radar: 'Trending' };
      return labels[source] || source;
    }

    function escHtml(t) { return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

    async function updateStatus(id, status) {
      try {
        await fetch(`/api/radar/items/${id}`, { method: 'PATCH', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ status }) });
        const item = allItems.find(i => i.id === id);
        if (item) item.status = status;
        renderItems();
        loadStats();
      } catch (err) {
        alert('Erro: ' + err.message);
      }
    }

    async function scanNow(motor) {
      const el = document.getElementById('scanStatus');
      const txt = document.getElementById('scanText');
      el.classList.add('active');
      txt.textContent = `Escaneando ${motor === 'all' ? 'todos os motores' : motor}...`;

      try {
        const res = await fetch('/api/radar/scan-now', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ motor }) });
        const data = await res.json();
        txt.textContent = `Scan concluido! ${JSON.stringify(data.result || {})}`;
        setTimeout(() => el.classList.remove('active'), 5000);
        loadItems();
        loadStats();
      } catch (err) {
        txt.textContent = `Erro no scan: ${err.message}`;
        setTimeout(() => el.classList.remove('active'), 5000);
      }
    }

    // Filter buttons
    document.querySelectorAll('.filter-btn[data-filter]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-filter]').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentFilter = btn.dataset.filter;
        currentStatus = null;
        document.querySelectorAll('.filter-btn[data-status]').forEach(b => b.classList.remove('active'));
        renderItems();
      });
    });
    document.querySelectorAll('.filter-btn[data-status]').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-btn[data-status]').forEach(b => b.classList.remove('active'));
        if (currentStatus === btn.dataset.status) {
          currentStatus = null;
        } else {
          btn.classList.add('active');
          currentStatus = btn.dataset.status;
        }
        renderItems();
      });
    });

    // Auto-refresh every 2 minutes
    loadItems();
    loadStats();
    setInterval(() => { loadItems(); loadStats(); }, 120000);
  </script>
</body>
</html>
