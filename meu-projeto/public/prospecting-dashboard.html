<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prospecção Ativa — Syra Digital</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg-base: #030303; --bg-surface: #0a0a0a; --bg-elevated: #101013;
  --bg-overlay: #18181d; --bg-card: #0d0d10; --bg-muted: #141417;
  --border-faint: #141417; --border-subtle: #1e1e23;
  --border-base: #27272d; --border-strong: #35353c;
  --border-accent: rgba(200,255,0,0.28);
  --text-primary: #F0F0F5; --text-secondary: #8F8FA0;
  --text-muted: #505060; --text-disabled: #36363f;
  --text-on-accent: #0a0a0a;
  --accent: #C8FF00; --accent-hover: #D8FF40;
  --accent-dim: rgba(200,255,0,0.08); --accent-mid: rgba(200,255,0,0.15);
  --accent-glow: rgba(200,255,0,0.22); --accent-border: rgba(200,255,0,0.28);
  --success: #22C55E; --success-bg: rgba(34,197,94,0.10);
  --warning: #F59E0B; --warning-bg: rgba(245,158,11,0.10);
  --danger: #EF4444; --danger-bg: rgba(239,68,68,0.10);
  --info: #60A5FA; --info-bg: rgba(96,165,250,0.10);
  --font-display: 'Space Grotesk', system-ui, sans-serif;
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', monospace;
  --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-xl: 16px; --r-full: 9999px;
  --ease-fast: 120ms cubic-bezier(0.4,0,0.2,1);
  --ease-base: 200ms cubic-bezier(0.4,0,0.2,1);
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body {
  background: var(--bg-base);
  color: var(--text-primary);
  font-family: var(--font-body);
  font-size: 14px;
  line-height: 1.5;
  overflow: hidden;
  display: flex;
  flex-direction: column;
}

/* ═══ TOPBAR ═══ */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 24px; height: 56px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-faint);
  background: var(--bg-surface);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo {
  width: 32px; height: 32px; background: var(--accent); color: var(--text-on-accent);
  border-radius: var(--r-md); display: flex; align-items: center; justify-content: center;
  font-family: var(--font-display); font-weight: 800; font-size: 14px;
  text-decoration: none;
}
.topbar-title { font-family: var(--font-display); font-weight: 700; font-size: 16px; letter-spacing: -0.02em; }
.topbar-title .accent { color: var(--accent); }
.topbar-right { display: flex; align-items: center; gap: 8px; }
.btn-sync {
  display: flex; align-items: center; gap: 6px; padding: 6px 14px;
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  border-radius: var(--r-md); color: var(--text-secondary); cursor: pointer;
  font-size: 12px; font-family: var(--font-body); transition: all var(--ease-fast);
}
.btn-sync:hover { border-color: var(--accent-border); color: var(--accent); }
.btn-sync.syncing { opacity: 0.6; pointer-events: none; }
.btn-sync svg { width: 14px; height: 14px; }
.sync-status { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* ═══ TABS ═══ */
.tab-bar {
  display: flex; gap: 0; padding: 0 24px; flex-shrink: 0;
  border-bottom: 1px solid var(--border-faint);
  background: var(--bg-surface);
}
.tab {
  padding: 10px 20px; font-size: 13px; font-weight: 600; cursor: pointer;
  color: var(--text-muted); border-bottom: 2px solid transparent;
  transition: all var(--ease-fast); display: flex; align-items: center; gap: 6px;
  background: none; border-top: none; border-left: none; border-right: none;
  font-family: var(--font-body);
}
.tab:hover { color: var(--text-secondary); }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab svg { width: 14px; height: 14px; }
.tab .badge-count {
  font-size: 10px; background: var(--accent-dim); color: var(--accent);
  padding: 1px 6px; border-radius: var(--r-full); font-family: var(--font-mono);
}

/* ═══ CONTENT ═══ */
.content { flex: 1; overflow-y: auto; padding: 24px; }
.content::-webkit-scrollbar { width: 5px; }
.content::-webkit-scrollbar-track { background: transparent; }
.content::-webkit-scrollbar-thumb { background: var(--border-base); border-radius: 3px; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ═══ KPI CARDS ═══ */
.kpi-grid {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
  gap: 16px; margin-bottom: 24px;
}
.kpi-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: 20px;
  transition: border-color var(--ease-fast);
}
.kpi-card:hover { border-color: var(--border-strong); }
.kpi-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; }
.kpi-value {
  font-family: var(--font-display); font-size: 28px; font-weight: 700;
  letter-spacing: -0.03em; margin-bottom: 6px;
}
.kpi-bar { height: 4px; background: var(--bg-overlay); border-radius: 2px; overflow: hidden; margin-top: 8px; }
.kpi-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease; }
.kpi-target { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); margin-top: 4px; }
.kpi-card.accent-glow { border-color: var(--accent-border); box-shadow: 0 0 20px rgba(200,255,0,0.08); }

/* ═══ PIPELINE KANBAN ═══ */
.kanban-container { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 16px; min-height: 500px; }
.kanban-container::-webkit-scrollbar { height: 5px; }
.kanban-container::-webkit-scrollbar-thumb { background: var(--border-base); border-radius: 3px; }
.kanban-col {
  min-width: 240px; max-width: 260px; flex-shrink: 0;
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); display: flex; flex-direction: column;
}
.kanban-header {
  padding: 12px 14px; border-bottom: 1px solid var(--border-faint);
  display: flex; align-items: center; justify-content: space-between;
}
.kanban-header-left { display: flex; align-items: center; gap: 8px; }
.kanban-header-dot { width: 8px; height: 8px; border-radius: 50%; }
.kanban-header-name { font-size: 12px; font-weight: 600; }
.kanban-header-count {
  font-size: 10px; background: var(--bg-overlay); padding: 2px 8px;
  border-radius: var(--r-full); color: var(--text-muted); font-family: var(--font-mono);
}
.kanban-cards { flex: 1; padding: 8px; overflow-y: auto; display: flex; flex-direction: column; gap: 8px; }
.kanban-cards::-webkit-scrollbar { width: 3px; }
.kanban-cards::-webkit-scrollbar-thumb { background: var(--border-faint); border-radius: 2px; }

.prospect-card {
  background: var(--bg-card); border: 1px solid var(--border-faint);
  border-radius: var(--r-md); padding: 12px; cursor: pointer;
  transition: all var(--ease-fast);
}
.prospect-card:hover { border-color: var(--border-strong); transform: translateY(-1px); }
.prospect-card-name { font-size: 13px; font-weight: 600; margin-bottom: 4px; }
.prospect-card-ig { font-size: 11px; color: var(--accent); font-family: var(--font-mono); margin-bottom: 6px; }
.prospect-card-meta { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.prospect-card-meta .chip {
  font-size: 10px; padding: 1px 6px; border-radius: var(--r-full);
  background: var(--bg-overlay); color: var(--text-muted);
}
.prospect-card-meta .chip.tag-curtiu { background: var(--success-bg); color: var(--success); }
.prospect-card-meta .chip.tag-comentou { background: var(--info-bg); color: var(--info); }
.prospect-card-meta .chip.tag-story { background: var(--warning-bg); color: var(--warning); }
.prospect-card-footer { display: flex; justify-content: space-between; align-items: center; }
.prospect-card-days { font-size: 10px; color: var(--text-muted); font-family: var(--font-mono); }
.btn-advance {
  padding: 3px 8px; font-size: 10px; background: var(--accent-dim);
  border: 1px solid var(--accent-border); border-radius: var(--r-sm);
  color: var(--accent); cursor: pointer; font-family: var(--font-mono);
  transition: all var(--ease-fast);
}
.btn-advance:hover { background: var(--accent); color: var(--text-on-accent); }

/* ═══ SCRIPTS TAB ═══ */
.scripts-filters {
  display: flex; gap: 12px; margin-bottom: 20px; flex-wrap: wrap;
}
.filter-select {
  background: var(--bg-elevated); border: 1px solid var(--border-subtle);
  color: var(--text-primary); padding: 8px 12px; border-radius: var(--r-md);
  font-size: 13px; font-family: var(--font-body); cursor: pointer;
  min-width: 180px;
}
.filter-select:focus { outline: none; border-color: var(--accent-border); }
.filter-select option { background: var(--bg-elevated); }

.scripts-grid { display: flex; flex-direction: column; gap: 12px; }
.script-group-title {
  font-family: var(--font-display); font-size: 16px; font-weight: 700;
  margin: 8px 0 4px; color: var(--accent);
}
.script-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: 16px; transition: border-color var(--ease-fast);
}
.script-card:hover { border-color: var(--border-strong); }
.script-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.script-card-name { font-size: 13px; font-weight: 600; }
.script-card-actions { display: flex; gap: 6px; }
.btn-copy, .btn-used {
  padding: 4px 10px; font-size: 11px; border-radius: var(--r-sm);
  cursor: pointer; font-family: var(--font-mono); display: flex; align-items: center; gap: 4px;
  transition: all var(--ease-fast); border: 1px solid;
}
.btn-copy { background: var(--accent-dim); border-color: var(--accent-border); color: var(--accent); }
.btn-copy:hover { background: var(--accent); color: var(--text-on-accent); }
.btn-copy.copied { background: var(--success); border-color: var(--success); color: #fff; }
.btn-used { background: var(--bg-overlay); border-color: var(--border-subtle); color: var(--text-muted); }
.btn-used:hover { border-color: var(--info); color: var(--info); }
.btn-used.active { background: var(--info-bg); border-color: var(--info); color: var(--info); }
.btn-copy svg, .btn-used svg { width: 12px; height: 12px; }
.script-text {
  font-size: 13px; color: var(--text-secondary); white-space: pre-wrap;
  line-height: 1.7; background: var(--bg-card); border-radius: var(--r-md);
  padding: 14px 16px; border-left: 3px solid var(--accent-border);
}

/* Procedures section (comments/stories) */
.procedure-section { margin-top: 32px; }
.procedure-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 700;
  margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border-faint);
}
.variation-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 16px; }
.variation-card {
  background: var(--bg-card); border: 1px solid var(--border-faint);
  border-radius: var(--r-md); padding: 12px; position: relative;
}
.variation-num {
  font-size: 10px; font-family: var(--font-mono); color: var(--accent);
  font-weight: 600; margin-bottom: 6px;
}
.variation-text { font-size: 12px; color: var(--text-secondary); line-height: 1.6; }
.variation-actions { margin-top: 8px; display: flex; gap: 6px; }

/* ═══ PROSPECT DETAIL MODAL ═══ */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.7);
  display: none; align-items: center; justify-content: center;
  z-index: 1000; backdrop-filter: blur(4px);
}
.modal-overlay.active { display: flex; }
.modal {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-xl); width: 90%; max-width: 640px; max-height: 85vh;
  overflow-y: auto; padding: 0;
}
.modal::-webkit-scrollbar { width: 4px; }
.modal::-webkit-scrollbar-thumb { background: var(--border-base); border-radius: 2px; }
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border-faint);
  display: flex; justify-content: space-between; align-items: flex-start;
  position: sticky; top: 0; background: var(--bg-surface); z-index: 1;
}
.modal-close {
  background: var(--bg-overlay); border: 1px solid var(--border-subtle);
  border-radius: var(--r-sm); width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; color: var(--text-muted); transition: all var(--ease-fast);
}
.modal-close:hover { color: var(--danger); border-color: var(--danger); }
.modal-close svg { width: 16px; height: 16px; }
.modal-name { font-family: var(--font-display); font-size: 20px; font-weight: 700; }
.modal-ig { color: var(--accent); font-family: var(--font-mono); font-size: 13px; margin-top: 2px; }
.modal-ig a { color: inherit; text-decoration: none; }
.modal-ig a:hover { text-decoration: underline; }
.modal-body { padding: 20px 24px; }
.modal-section { margin-bottom: 20px; }
.modal-section-title {
  font-family: var(--font-display); font-size: 13px; font-weight: 700;
  color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em;
  margin-bottom: 10px;
}
.modal-info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.modal-info-item {
  background: var(--bg-card); border: 1px solid var(--border-faint);
  border-radius: var(--r-md); padding: 10px 14px;
}
.modal-info-label { font-size: 10px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; }
.modal-info-value { font-size: 14px; font-weight: 600; margin-top: 2px; }

/* Timeline */
.timeline { position: relative; padding-left: 20px; }
.timeline::before {
  content: ''; position: absolute; left: 5px; top: 4px; bottom: 4px;
  width: 2px; background: var(--border-subtle);
}
.timeline-item { position: relative; padding: 0 0 16px; }
.timeline-item:last-child { padding-bottom: 0; }
.timeline-dot {
  position: absolute; left: -20px; top: 4px; width: 12px; height: 12px;
  border-radius: 50%; border: 2px solid var(--border-base); background: var(--bg-surface);
}
.timeline-item.current .timeline-dot { border-color: var(--accent); background: var(--accent); }
.timeline-stage { font-size: 13px; font-weight: 600; }
.timeline-date { font-size: 11px; color: var(--text-muted); font-family: var(--font-mono); }

/* Notes */
.notes-list { display: flex; flex-direction: column; gap: 8px; }
.note-item {
  background: var(--bg-card); border: 1px solid var(--border-faint);
  border-radius: var(--r-md); padding: 10px 14px;
}
.note-text { font-size: 13px; color: var(--text-secondary); }
.note-meta { font-size: 10px; color: var(--text-muted); margin-top: 4px; font-family: var(--font-mono); }
.note-input-row { display: flex; gap: 8px; margin-top: 10px; }
.note-input {
  flex: 1; background: var(--bg-card); border: 1px solid var(--border-subtle);
  border-radius: var(--r-md); padding: 8px 12px; color: var(--text-primary);
  font-size: 13px; font-family: var(--font-body);
}
.note-input:focus { outline: none; border-color: var(--accent-border); }
.btn-add-note {
  padding: 8px 16px; background: var(--accent); color: var(--text-on-accent);
  border: none; border-radius: var(--r-md); cursor: pointer; font-weight: 600;
  font-size: 12px; font-family: var(--font-body); transition: background var(--ease-fast);
}
.btn-add-note:hover { background: var(--accent-hover); }

/* ═══ GOALS TAB ═══ */
.goals-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
.goals-form-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: 20px;
}
.goals-form-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 16px;
}
.goal-field { margin-bottom: 12px; }
.goal-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
.goal-input {
  width: 100%; background: var(--bg-card); border: 1px solid var(--border-faint);
  border-radius: var(--r-md); padding: 8px 12px; color: var(--text-primary);
  font-size: 14px; font-family: var(--font-mono);
}
.goal-input:focus { outline: none; border-color: var(--accent-border); }
.btn-save-goals {
  width: 100%; padding: 10px; background: var(--accent); color: var(--text-on-accent);
  border: none; border-radius: var(--r-md); cursor: pointer; font-weight: 700;
  font-size: 13px; font-family: var(--font-body); margin-top: 4px;
  transition: background var(--ease-fast);
}
.btn-save-goals:hover { background: var(--accent-hover); }

.goals-progress-card {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: 20px;
}
.progress-item { margin-bottom: 16px; }
.progress-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.progress-label { font-size: 12px; font-weight: 600; }
.progress-nums { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); }
.progress-bar { height: 8px; background: var(--bg-overlay); border-radius: 4px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s ease; }

.chart-container {
  background: var(--bg-surface); border: 1px solid var(--border-subtle);
  border-radius: var(--r-lg); padding: 20px; margin-top: 24px;
}
.chart-title {
  font-family: var(--font-display); font-size: 15px; font-weight: 700; margin-bottom: 16px;
}

/* Funnel */
.funnel-container { margin-top: 24px; }
.funnel-step {
  display: flex; align-items: center; gap: 12px; margin-bottom: 4px;
}
.funnel-bar-bg {
  flex: 1; height: 32px; background: var(--bg-overlay); border-radius: var(--r-sm);
  overflow: hidden; position: relative;
}
.funnel-bar-fill { height: 100%; border-radius: var(--r-sm); transition: width 0.6s ease; display: flex; align-items: center; padding-left: 10px; }
.funnel-bar-label { font-size: 11px; font-weight: 600; color: var(--text-on-accent); white-space: nowrap; }
.funnel-step-label { font-size: 12px; color: var(--text-secondary); min-width: 120px; }
.funnel-step-count { font-size: 12px; color: var(--text-muted); font-family: var(--font-mono); min-width: 30px; text-align: right; }

/* ═══ TOAST ═══ */
.toast {
  position: fixed; bottom: 24px; right: 24px; background: var(--bg-elevated);
  border: 1px solid var(--border-subtle); border-radius: var(--r-md);
  padding: 10px 20px; font-size: 13px; color: var(--text-primary);
  transform: translateY(80px); opacity: 0; transition: all 0.3s ease;
  z-index: 2000; display: flex; align-items: center; gap: 8px;
}
.toast.show { transform: translateY(0); opacity: 1; }
.toast.success { border-color: var(--success); }
.toast.success .toast-icon { color: var(--success); }

/* ═══ RESPONSIVE ═══ */
@media (max-width: 900px) {
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .goals-layout { grid-template-columns: 1fr; }
  .variation-grid { grid-template-columns: 1fr; }
  .modal-info-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-left">
    <a href="/" class="topbar-logo">S</a>
    <span class="topbar-title"><span class="accent">Prospecção</span> Ativa</span>
  </div>
  <div class="topbar-right">
    <span class="sync-status" id="syncStatus"></span>
    <button class="btn-sync" id="btnSync" onclick="syncGHL()">
      <i data-lucide="refresh-cw"></i> Sync GHL
    </button>
  </div>
</div>

<!-- TABS -->
<div class="tab-bar">
  <button class="tab active" data-tab="overview" onclick="switchTab('overview')">
    <i data-lucide="layout-dashboard"></i> Overview
  </button>
  <button class="tab" data-tab="pipeline" onclick="switchTab('pipeline')">
    <i data-lucide="columns-3"></i> Pipeline <span class="badge-count" id="pipelineCount">0</span>
  </button>
  <button class="tab" data-tab="scripts" onclick="switchTab('scripts')">
    <i data-lucide="copy"></i> Scripts
  </button>
  <button class="tab" data-tab="goals" onclick="switchTab('goals')">
    <i data-lucide="target"></i> Metas
  </button>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- ═══ OVERVIEW ═══ -->
  <div class="tab-panel active" id="panel-overview">
    <div class="kpi-grid" id="kpiGrid"></div>
    <div class="chart-container">
      <div class="chart-title">Funil de Conversão</div>
      <div id="funnelContainer" class="funnel-container"></div>
    </div>
  </div>

  <!-- ═══ PIPELINE ═══ -->
  <div class="tab-panel" id="panel-pipeline">
    <div class="kanban-container" id="kanbanContainer"></div>
  </div>

  <!-- ═══ SCRIPTS ═══ -->
  <div class="tab-panel" id="panel-scripts">
    <div class="scripts-filters">
      <select class="filter-select" id="filterStage" onchange="renderScripts()">
        <option value="">Todos os estágios</option>
      </select>
      <select class="filter-select" id="filterProcedure" onchange="renderScripts()">
        <option value="">Todos os procedimentos</option>
      </select>
    </div>
    <div id="scriptsContent"></div>
  </div>

  <!-- ═══ GOALS ═══ -->
  <div class="tab-panel" id="panel-goals">
    <div class="goals-layout">
      <div class="goals-form-card">
        <div class="goals-form-title">Metas da Semana</div>
        <div class="goal-field">
          <div class="goal-label">Novos Prospects</div>
          <input type="number" class="goal-input" id="goalProspects" value="15">
        </div>
        <div class="goal-field">
          <div class="goal-label">DMs Enviadas</div>
          <input type="number" class="goal-input" id="goalDMs" value="10">
        </div>
        <div class="goal-field">
          <div class="goal-label">Calls Agendadas</div>
          <input type="number" class="goal-input" id="goalCalls" value="5">
        </div>
        <div class="goal-field">
          <div class="goal-label">Propostas</div>
          <input type="number" class="goal-input" id="goalProposals" value="3">
        </div>
        <button class="btn-save-goals" onclick="saveGoals()">Salvar Metas</button>
      </div>
      <div class="goals-progress-card">
        <div class="goals-form-title">Progresso</div>
        <div id="goalsProgress"></div>
      </div>
    </div>
    <div class="chart-container">
      <div class="chart-title">Semana a Semana</div>
      <canvas id="weeklyChart" height="200"></canvas>
    </div>
  </div>

</div>

<!-- PROSPECT DETAIL MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="modalContent"></div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"><span class="toast-icon"><i data-lucide="check"></i></span><span id="toastText"></span></div>

<script>
// ═══ STATE ═══
let allProspects = [];
let pipelineData = [];
let scriptsData = { stages: {}, procedures: [] };
let goalsData = { current: null, history: [] };
let metricsData = { metrics: {}, targets: {} };
let selectedProspect = null;
let weeklyChart = null;

// ═══ INIT ═══
document.addEventListener('DOMContentLoaded', async () => {
  lucide.createIcons();
  await Promise.all([loadPipeline(), loadMetrics(), loadScripts(), loadGoals()]);
  renderOverview();
  renderPipeline();
  renderScriptsFilters();
  renderScripts();
  renderGoals();
});

// ═══ DATA LOADING ═══
async function loadPipeline() {
  try {
    const [pRes, prRes] = await Promise.all([
      fetch('/api/prospecting/pipeline').then(r => r.json()),
      fetch('/api/prospecting/prospects').then(r => r.json()),
    ]);
    pipelineData = pRes.stages || [];
    allProspects = prRes.prospects || [];
    const total = pipelineData.reduce((s, p) => s + p.count, 0);
    document.getElementById('pipelineCount').textContent = total;
  } catch (e) { console.error('Load pipeline:', e); }
}

async function loadMetrics() {
  try {
    metricsData = await fetch('/api/prospecting/metrics').then(r => r.json());
  } catch (e) { console.error('Load metrics:', e); }
}

async function loadScripts() {
  try {
    scriptsData = await fetch('/api/prospecting/scripts').then(r => r.json());
  } catch (e) { console.error('Load scripts:', e); }
}

async function loadGoals() {
  try {
    goalsData = await fetch('/api/prospecting/goals').then(r => r.json());
  } catch (e) { console.error('Load goals:', e); }
}

// ═══ TABS ═══
function switchTab(tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tabId));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.id === `panel-${tabId}`));
}

// ═══ OVERVIEW ═══
function renderOverview() {
  const m = metricsData.metrics || {};
  const t = metricsData.targets || {};
  const goals = m.weeklyGoals || {};

  const kpis = [
    { label: 'Meta Semanal', value: `${goals.actual_prospects || 0}/${goals.goal_prospects || 15}`, pct: goals.goal_prospects ? (goals.actual_prospects||0)/goals.goal_prospects*100 : 0, color: 'var(--accent)', glow: true },
    { label: 'Taxa Resposta DM', value: `${m.responseRate || 0}%`, pct: t.responseRate ? (m.responseRate||0)/t.responseRate*100 : 0, color: 'var(--info)', target: `Meta: ${t.responseRate||30}%` },
    { label: 'Taxa Agendamento', value: `${m.schedulingRate || 0}%`, pct: t.schedulingRate ? (m.schedulingRate||0)/t.schedulingRate*100 : 0, color: 'var(--warning)', target: `Meta: ${t.schedulingRate||40}%` },
    { label: 'Conversão Total', value: `${m.conversionRate || 0}%`, pct: t.conversionRate ? (m.conversionRate||0)/t.conversionRate*100 : 0, color: 'var(--success)', target: `Meta: ${t.conversionRate||25}%` },
    { label: 'Prospects Ativos', value: m.total || 0, color: 'var(--text-primary)' },
    { label: 'Tempo Médio (dias)', value: m.avgCycleDays || '—', color: 'var(--text-primary)', target: m.avgCycleDays ? `Meta: ${t.avgCycleDays?.min||14}-${t.avgCycleDays?.max||21}d` : '' },
  ];

  document.getElementById('kpiGrid').innerHTML = kpis.map(k => `
    <div class="kpi-card${k.glow ? ' accent-glow' : ''}">
      <div class="kpi-label">${k.label}</div>
      <div class="kpi-value" style="color:${k.color}">${k.value}</div>
      ${k.pct !== undefined ? `<div class="kpi-bar"><div class="kpi-bar-fill" style="width:${Math.min(k.pct,100)}%;background:${k.color}"></div></div>` : ''}
      ${k.target ? `<div class="kpi-target">${k.target}</div>` : ''}
    </div>
  `).join('');

  renderFunnel();
}

function renderFunnel() {
  const sc = metricsData.metrics?.stageCounts || {};
  const funnelStages = [
    { id: 'qualified', name: 'Qualificado', color: '#60A5FA' },
    { id: 'warming', name: 'Aquecendo', color: '#FBBF24' },
    { id: 'dm_sent', name: 'DM Enviada', color: '#A78BFA' },
    { id: 'in_conversation', name: 'Em Conversa', color: '#34D399' },
    { id: 'pitch_done', name: 'Pitch Feito', color: '#F97316' },
    { id: 'call_scheduled', name: 'Call Agendada', color: '#818CF8' },
    { id: 'proposal_sent', name: 'Proposta', color: '#FB923C' },
    { id: 'won', name: 'Ganho', color: '#22C55E' },
  ];

  const max = Math.max(1, ...funnelStages.map(s => sc[s.id] || 0));
  document.getElementById('funnelContainer').innerHTML = funnelStages.map(s => {
    const count = sc[s.id] || 0;
    const pct = (count / max) * 100;
    return `<div class="funnel-step">
      <span class="funnel-step-label">${s.name}</span>
      <div class="funnel-bar-bg"><div class="funnel-bar-fill" style="width:${Math.max(pct,4)}%;background:${s.color}"><span class="funnel-bar-label">${count}</span></div></div>
      <span class="funnel-step-count">${count}</span>
    </div>`;
  }).join('');
}

// ═══ PIPELINE KANBAN ═══
function renderPipeline() {
  const container = document.getElementById('kanbanContainer');
  const prospectsByStage = {};
  for (const p of allProspects) {
    if (!prospectsByStage[p.stage]) prospectsByStage[p.stage] = [];
    prospectsByStage[p.stage].push(p);
  }

  container.innerHTML = pipelineData.map(stage => {
    const prospects = prospectsByStage[stage.id] || [];
    const nextStage = pipelineData.find(s => s.position === stage.position + 1);
    return `<div class="kanban-col">
      <div class="kanban-header">
        <div class="kanban-header-left">
          <span class="kanban-header-dot" style="background:${stage.color}"></span>
          <span class="kanban-header-name">${stage.name}</span>
        </div>
        <span class="kanban-header-count">${stage.count}</span>
      </div>
      <div class="kanban-cards">
        ${prospects.map(p => renderProspectCard(p, nextStage)).join('')}
      </div>
    </div>`;
  }).join('');
}

function renderProspectCard(p, nextStage) {
  const tags = (p.tags || []);
  const daysAgo = Math.floor((Date.now() - new Date(p.updated_at).getTime()) / 86400000);
  const tagChips = tags.filter(t => ['curtiu','comentou','story'].includes(t))
    .map(t => `<span class="chip tag-${t}">${t}</span>`).join('');
  const procChip = p.procedure_type ? `<span class="chip">${p.procedure_type}</span>` : '';

  return `<div class="prospect-card" onclick="openProspectDetail('${p.id}')">
    <div class="prospect-card-name">${esc(p.name)}</div>
    ${p.instagram ? `<div class="prospect-card-ig">@${esc(p.instagram)}</div>` : ''}
    <div class="prospect-card-meta">${procChip}${tagChips}</div>
    <div class="prospect-card-footer">
      <span class="prospect-card-days">${daysAgo}d</span>
      ${nextStage ? `<button class="btn-advance" onclick="event.stopPropagation();advanceProspect('${p.id}','${nextStage.id}')">${nextStage.name} →</button>` : ''}
    </div>
  </div>`;
}

// ═══ ADVANCE PROSPECT ═══
async function advanceProspect(id, stage) {
  try {
    await fetch(`/api/prospecting/prospect/${id}/advance`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ stage }),
    });
    showToast('Prospect avançado!');
    await loadPipeline();
    renderPipeline();
    await loadMetrics();
    renderOverview();
  } catch (e) { console.error('Advance:', e); }
}

// ═══ PROSPECT DETAIL ═══
async function openProspectDetail(id) {
  try {
    const data = await fetch(`/api/prospecting/prospect/${id}`).then(r => r.json());
    selectedProspect = data;
    renderModal(data);
    document.getElementById('modalOverlay').classList.add('active');
  } catch (e) { console.error('Detail:', e); }
}

function renderModal(p) {
  const stageInfo = pipelineData.find(s => s.id === p.stage) || {};
  const tags = p.tags || [];
  const igUrl = p.instagram ? `https://instagram.com/${p.instagram}` : '#';

  document.getElementById('modalContent').innerHTML = `
    <div class="modal-header">
      <div>
        <div class="modal-name">${esc(p.name)}</div>
        ${p.instagram ? `<div class="modal-ig"><a href="${igUrl}" target="_blank">@${esc(p.instagram)}</a></div>` : ''}
      </div>
      <button class="modal-close" onclick="closeModal()"><i data-lucide="x"></i></button>
    </div>
    <div class="modal-body">
      <div class="modal-section">
        <div class="modal-section-title">Informações</div>
        <div class="modal-info-grid">
          <div class="modal-info-item">
            <div class="modal-info-label">Estágio</div>
            <div class="modal-info-value" style="color:${stageInfo.color||'inherit'}">${stageInfo.name||p.stage}</div>
          </div>
          <div class="modal-info-item">
            <div class="modal-info-label">Procedimento</div>
            <div class="modal-info-value">${p.procedure_type || '—'}</div>
          </div>
          <div class="modal-info-item">
            <div class="modal-info-label">Seguidores</div>
            <div class="modal-info-value">${p.followers ? p.followers.toLocaleString('pt-BR') : '—'}</div>
          </div>
          <div class="modal-info-item">
            <div class="modal-info-label">Tags</div>
            <div class="modal-info-value">${tags.length ? tags.join(', ') : '—'}</div>
          </div>
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Timeline</div>
        <div class="timeline">
          ${(p.transitions || []).map((t, i) => `
            <div class="timeline-item${i === 0 ? ' current' : ''}">
              <div class="timeline-dot"></div>
              <div class="timeline-stage">${getStageName(t.from_stage)} → ${getStageName(t.to_stage)}</div>
              <div class="timeline-date">${new Date(t.created_at).toLocaleString('pt-BR')}</div>
            </div>
          `).join('') || '<div style="color:var(--text-muted);font-size:12px">Nenhuma transição registrada</div>'}
        </div>
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Scripts Usados</div>
        ${(p.messages || []).length ? p.messages.map(m => `
          <div style="font-size:12px;color:var(--text-secondary);padding:4px 0">
            <span style="color:var(--accent);font-family:var(--font-mono)">${esc(m.script_id)}</span>
            <span style="color:var(--text-muted);margin-left:8px">${new Date(m.created_at).toLocaleDateString('pt-BR')}</span>
          </div>
        `).join('') : '<div style="color:var(--text-muted);font-size:12px">Nenhum script registrado</div>'}
      </div>

      <div class="modal-section">
        <div class="modal-section-title">Notas</div>
        <div class="notes-list">
          ${(p.notes || []).map(n => `
            <div class="note-item">
              <div class="note-text">${esc(n.note)}</div>
              <div class="note-meta">${n.author} · ${new Date(n.created_at).toLocaleString('pt-BR')}</div>
            </div>
          `).join('')}
        </div>
        <div class="note-input-row">
          <input type="text" class="note-input" id="noteInput" placeholder="Adicionar nota..." onkeydown="if(event.key==='Enter')addNote('${p.id}')">
          <button class="btn-add-note" onclick="addNote('${p.id}')">Salvar</button>
        </div>
      </div>
    </div>
  `;
  lucide.createIcons();
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('active');
  selectedProspect = null;
}

function getStageName(id) {
  const s = pipelineData.find(s => s.id === id);
  return s ? s.name : (id || '—');
}

async function addNote(prospectId) {
  const input = document.getElementById('noteInput');
  const note = input.value.trim();
  if (!note) return;
  try {
    await fetch(`/api/prospecting/prospect/${prospectId}/note`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ note }),
    });
    input.value = '';
    showToast('Nota adicionada!');
    await openProspectDetail(prospectId);
  } catch (e) { console.error('Add note:', e); }
}

// ═══ SCRIPTS ═══
function renderScriptsFilters() {
  const stageSelect = document.getElementById('filterStage');
  const procSelect = document.getElementById('filterProcedure');

  for (const [key, val] of Object.entries(scriptsData.stages || {})) {
    stageSelect.innerHTML += `<option value="${key}">${val.label}</option>`;
  }
  for (const proc of scriptsData.procedures || []) {
    procSelect.innerHTML += `<option value="${proc.id}">${proc.name}</option>`;
  }
}

function renderScripts() {
  const stageFilter = document.getElementById('filterStage').value;
  const procFilter = document.getElementById('filterProcedure').value;
  const container = document.getElementById('scriptsContent');
  let html = '';

  // Stage scripts
  const stages = scriptsData.stages || {};
  for (const [stageId, stageData] of Object.entries(stages)) {
    if (stageFilter && stageFilter !== stageId) continue;
    html += `<div class="script-group-title">${stageData.label}</div>`;
    html += '<div class="scripts-grid">';
    for (const script of stageData.scripts || []) {
      html += renderScriptCard(script);
    }
    html += '</div>';
  }

  // Procedure variations
  const procedures = scriptsData.procedures || [];
  for (const proc of procedures) {
    if (procFilter && procFilter !== proc.id) continue;
    html += `<div class="procedure-section">
      <div class="procedure-title">${proc.name}</div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Comentários no Feed</div>
      <div class="variation-grid">
        ${proc.comments.map((c, i) => renderVariation(proc.id, 'comment', i, c)).join('')}
      </div>
      <div style="font-size:12px;color:var(--text-muted);margin-bottom:8px">Respostas em Stories</div>
      <div class="variation-grid">
        ${proc.stories.map((s, i) => renderVariation(proc.id, 'story', i, s)).join('')}
      </div>
    </div>`;
  }

  container.innerHTML = html || '<div style="color:var(--text-muted);padding:40px;text-align:center">Selecione filtros acima</div>';
  lucide.createIcons();
}

function renderScriptCard(script) {
  return `<div class="script-card">
    <div class="script-card-header">
      <span class="script-card-name">${esc(script.name)}</span>
      <div class="script-card-actions">
        <button class="btn-copy" onclick="copyScript(this, ${JSON.stringify(JSON.stringify(script.text))})">
          <i data-lucide="copy"></i> Copiar
        </button>
      </div>
    </div>
    <div class="script-text">${esc(script.text)}</div>
  </div>`;
}

function renderVariation(procId, type, idx, text) {
  const scriptId = `${procId}-${type}-${idx+1}`;
  return `<div class="variation-card">
    <div class="variation-num">V${idx+1}</div>
    <div class="variation-text">${esc(text)}</div>
    <div class="variation-actions">
      <button class="btn-copy" onclick="copyScript(this, ${JSON.stringify(JSON.stringify(text))})">
        <i data-lucide="copy"></i> Copiar
      </button>
    </div>
  </div>`;
}

async function copyScript(btn, text) {
  try {
    await navigator.clipboard.writeText(text);
    btn.classList.add('copied');
    btn.innerHTML = '<i data-lucide="check"></i> Copiado!';
    lucide.createIcons();
    showToast('Script copiado!');
    setTimeout(() => {
      btn.classList.remove('copied');
      btn.innerHTML = '<i data-lucide="copy"></i> Copiar';
      lucide.createIcons();
    }, 2000);
  } catch (e) { console.error('Copy:', e); }
}

// ═══ GOALS ═══
function renderGoals() {
  const g = goalsData.current;
  if (!g) return;

  document.getElementById('goalProspects').value = g.goal_prospects;
  document.getElementById('goalDMs').value = g.goal_dms;
  document.getElementById('goalCalls').value = g.goal_calls;
  document.getElementById('goalProposals').value = g.goal_proposals;

  const items = [
    { label: 'Prospects', actual: g.actual_prospects, goal: g.goal_prospects, color: 'var(--accent)' },
    { label: 'DMs Enviadas', actual: g.actual_dms, goal: g.goal_dms, color: 'var(--info)' },
    { label: 'Calls', actual: g.actual_calls, goal: g.goal_calls, color: 'var(--warning)' },
    { label: 'Propostas', actual: g.actual_proposals, goal: g.goal_proposals, color: 'var(--success)' },
  ];

  document.getElementById('goalsProgress').innerHTML = items.map(i => {
    const pct = i.goal ? Math.min(i.actual / i.goal * 100, 100) : 0;
    return `<div class="progress-item">
      <div class="progress-header">
        <span class="progress-label">${i.label}</span>
        <span class="progress-nums">${i.actual}/${i.goal}</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${i.color}"></div></div>
    </div>`;
  }).join('');

  renderWeeklyChart();
}

function renderWeeklyChart() {
  const history = (goalsData.history || []).reverse();
  if (!history.length) return;

  const ctx = document.getElementById('weeklyChart').getContext('2d');
  if (weeklyChart) weeklyChart.destroy();

  weeklyChart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: history.map(h => h.week_start),
      datasets: [
        { label: 'Prospects', data: history.map(h => h.actual_prospects), backgroundColor: 'rgba(200,255,0,0.6)' },
        { label: 'DMs', data: history.map(h => h.actual_dms), backgroundColor: 'rgba(96,165,250,0.6)' },
        { label: 'Calls', data: history.map(h => h.actual_calls), backgroundColor: 'rgba(245,158,11,0.6)' },
        { label: 'Propostas', data: history.map(h => h.actual_proposals), backgroundColor: 'rgba(34,197,94,0.6)' },
      ],
    },
    options: {
      responsive: true,
      plugins: {
        legend: { labels: { color: '#8F8FA0', font: { family: 'Inter', size: 11 } } },
      },
      scales: {
        x: { ticks: { color: '#505060', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1e1e23' } },
        y: { ticks: { color: '#505060', font: { family: 'JetBrains Mono', size: 10 } }, grid: { color: '#1e1e23' }, beginAtZero: true },
      },
    },
  });
}

async function saveGoals() {
  try {
    await fetch('/api/prospecting/goals', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        prospects: parseInt(document.getElementById('goalProspects').value) || 15,
        dms: parseInt(document.getElementById('goalDMs').value) || 10,
        calls: parseInt(document.getElementById('goalCalls').value) || 5,
        proposals: parseInt(document.getElementById('goalProposals').value) || 3,
      }),
    });
    showToast('Metas salvas!');
    await loadGoals();
    renderGoals();
  } catch (e) { console.error('Save goals:', e); }
}

// ═══ SYNC ═══
async function syncGHL() {
  const btn = document.getElementById('btnSync');
  btn.classList.add('syncing');
  document.getElementById('syncStatus').textContent = 'Sincronizando...';

  try {
    const res = await fetch('/api/prospecting/sync', { method: 'POST' });
    const data = await res.json();
    document.getElementById('syncStatus').textContent = data.ok
      ? `${data.synced} prospects sincronizados`
      : `Erro: ${data.error}`;
    showToast(`Sync: ${data.synced || 0} prospects`);
    await Promise.all([loadPipeline(), loadMetrics(), loadGoals()]);
    renderOverview();
    renderPipeline();
    renderGoals();
  } catch (e) {
    document.getElementById('syncStatus').textContent = 'Erro no sync';
    console.error('Sync:', e);
  } finally {
    btn.classList.remove('syncing');
  }
}

// ═══ UTILS ═══
function esc(s) { if (!s) return ''; const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function showToast(text) {
  const toast = document.getElementById('toast');
  document.getElementById('toastText').textContent = text;
  toast.classList.add('show', 'success');
  setTimeout(() => toast.classList.remove('show', 'success'), 3000);
}
</script>
</body>
</html>
