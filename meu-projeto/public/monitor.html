<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 Nico Monitor - Log</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #ffffff;
      line-height: 1.6;
      font-size: 12px;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* HEADER */
    .header {
      background: #0d0d0f;
      border-bottom: 2px solid #333;
      padding: 12px 15px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header h1 {
      font-size: 16px;
      letter-spacing: 1px;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
    }

    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background: #e74c3c;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      background: #3498db;
      border: 1px solid #2980b9;
      color: #fff;
      padding: 6px 12px;
      border-radius: 3px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 11px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #2980b9;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* LOG AREA */
    .log {
      flex: 1;
      overflow-y: auto;
      padding: 10px 15px;
      background: #1a1a1a;
    }

    .log-entry {
      padding: 6px 0;
      border-bottom: 1px solid #2a2a2a;
      display: flex;
      gap: 12px;
      animation: slideIn 0.2s ease-out;
      word-break: break-word;
    }

    .log-entry:hover {
      background: #1f1f1f;
      padding: 6px 8px;
      border-radius: 2px;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateX(-10px);
      }
      to {
        opacity: 1;
        transform: translateX(0);
      }
    }

    .log-time {
      color: #666;
      min-width: 75px;
      white-space: nowrap;
    }

    .log-client {
      min-width: 90px;
      font-weight: bold;
      white-space: nowrap;
    }

    .log-client.erico {
      color: #d6ba9e;
    }

    .log-client.humberto {
      color: #3498db;
    }

    .log-client.gabrielle {
      color: #e74c3c;
    }

    .log-name {
      color: #999;
      min-width: 100px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .log-message {
      flex: 1;
      color: #e0e0e0;
      word-break: break-word;
    }

    .log-status {
      color: #2ecc71;
      min-width: 25px;
      white-space: nowrap;
    }

    .empty {
      color: #666;
      text-align: center;
      padding: 40px;
    }

    /* SCROLLBAR */
    .log::-webkit-scrollbar {
      width: 8px;
    }

    .log::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .log::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    .log::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* FOOTER */
    .footer {
      background: #0d0d0f;
      border-top: 2px solid #333;
      padding: 10px 15px;
      font-size: 11px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .stats {
      display: flex;
      gap: 20px;
    }

    .stat {
      display: flex;
      gap: 5px;
    }

    .stat-label {
      color: #666;
    }

    .stat-value {
      color: #2ecc71;
      font-weight: bold;
    }

    .last-update {
      color: #666;
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1>🔴 NICO MONITOR - LOG</h1>
      <div class="controls">
        <div class="status">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Online</span>
        </div>
        <button class="btn" id="refresh-btn" onclick="loadLog()">🔄 Refresh</button>
        <button class="btn" onclick="clearLog()">🗑️ Limpar</button>
      </div>
    </div>

    <!-- LOG -->
    <div class="log" id="log">
      <div class="empty">Aguardando mensagens...</div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="stats">
        <div class="stat">
          <span class="stat-label">Total:</span>
          <span class="stat-value" id="total">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Erico:</span>
          <span class="stat-value" id="erico-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Humberto:</span>
          <span class="stat-value" id="humberto-count">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Gabrielle:</span>
          <span class="stat-value" id="gabrielle-count">0</span>
        </div>
      </div>
      <div class="last-update">
        Última: <span id="last-update">—</span>
      </div>
    </div>
  </div>

  <script>
    const logData = [];
    const MAX_ENTRIES = 100;

    function formatTime(timestamp) {
      const date = new Date(timestamp);
      return date.toLocaleTimeString('pt-BR', {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function truncateText(text, length = 60) {
      if (!text) return '[vazio]';
      if (text.length > length) return text.substring(0, length) + '...';
      return text;
    }

    function addEntry(client, pushName, message, timestamp) {
      const entry = { client, pushName, message, timestamp };
      logData.unshift(entry);

      // Manter apenas últimas 100
      if (logData.length > MAX_ENTRIES) {
        logData.pop();
      }

      renderLog();
      updateStats();
    }

    function renderLog() {
      const logEl = document.getElementById('log');

      if (logData.length === 0) {
        logEl.innerHTML = '<div class="empty">Aguardando mensagens...</div>';
        return;
      }

      logEl.innerHTML = logData.map(entry => `
        <div class="log-entry">
          <div class="log-time">${formatTime(entry.timestamp)}</div>
          <div class="log-client ${entry.client}">${entry.client.toUpperCase()}</div>
          <div class="log-name" title="${entry.pushName}">${entry.pushName}</div>
          <div class="log-message" title="${entry.message}">${truncateText(entry.message)}</div>
          <div class="log-status">✅</div>
        </div>
      `).join('');

      logEl.scrollTop = 0;
    }

    function updateStats() {
      const total = logData.length;
      const erico = logData.filter(e => e.client === 'erico').length;
      const humberto = logData.filter(e => e.client === 'humberto').length;
      const gabrielle = logData.filter(e => e.client === 'gabrielle').length;

      document.getElementById('total').textContent = total;
      document.getElementById('erico-count').textContent = erico;
      document.getElementById('humberto-count').textContent = humberto;
      document.getElementById('gabrielle-count').textContent = gabrielle;
      document.getElementById('last-update').textContent = new Date().toLocaleTimeString('pt-BR');
    }

    function clearLog() {
      if (confirm('Limpar log? ⚠️')) {
        logData.length = 0;
        renderLog();
        updateStats();
      }
    }

    async function loadLog() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const response = await fetch('/api/monitor/messages?limit=100');
        const data = await response.json();

        logData.length = 0;

        // Adicionar mensagens em ordem inversa (mais recentes primeiro)
        [
          ...data.gabrielle.reverse(),
          ...data.humberto.reverse(),
          ...data.erico.reverse()
        ].forEach(msg => {
          addEntry(
            msg.chat_name?.toLowerCase().includes('erico') ? 'erico' :
            msg.chat_name?.toLowerCase().includes('humberto') ? 'humberto' :
            'gabrielle',
            msg.push_name || 'Desconhecido',
            msg.content || '[sem conteúdo]',
            msg.timestamp
          );
        });

        renderLog();
        updateStats();
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('status-dot').classList.add('offline');
        document.getElementById('status-text').textContent = 'Offline';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Auto-refresh a cada 3 segundos
    setInterval(loadLog, 3000);

    // Carregar na inicialização
    loadLog();
  </script>
</body>
</html>
