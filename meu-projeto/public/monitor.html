<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 Nico Monitor - WhatsApp Activity</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Courier New', monospace;
      background: #1a1a1a;
      color: #ffffff;
      line-height: 1.4;
    }

    .container {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    /* HEADER */
    .header {
      background: #0d0d0f;
      border-bottom: 2px solid #333;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 15px;
    }

    .header h1 {
      font-size: 20px;
      font-weight: bold;
      letter-spacing: 1px;
    }

    .header-controls {
      display: flex;
      gap: 15px;
      align-items: center;
    }

    .status-indicator {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
    }

    .status-dot {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #2ecc71;
      animation: pulse 2s infinite;
    }

    .status-dot.offline {
      background: #e74c3c;
      animation: none;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .btn {
      background: #3498db;
      border: 1px solid #2980b9;
      color: #fff;
      padding: 8px 16px;
      border-radius: 4px;
      cursor: pointer;
      font-family: 'Courier New', monospace;
      font-size: 12px;
      transition: all 0.2s;
    }

    .btn:hover {
      background: #2980b9;
      border-color: #1f618d;
    }

    .btn:active {
      transform: scale(0.95);
    }

    .btn.loading {
      opacity: 0.6;
      cursor: not-allowed;
    }

    /* MAIN CONTENT */
    .content {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0;
      overflow: hidden;
    }

    .column {
      display: flex;
      flex-direction: column;
      border-right: 1px solid #333;
      overflow: hidden;
    }

    .column:last-child {
      border-right: none;
    }

    .column-header {
      padding: 15px;
      border-bottom: 2px solid #333;
      background: #0d0d0f;
    }

    .column-header h2 {
      font-size: 16px;
      margin-bottom: 8px;
      font-weight: bold;
    }

    .column-header .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      font-size: 11px;
      color: #999;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .stat-label {
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .stat-value {
      color: #2ecc71;
      font-weight: bold;
    }

    /* CLIENT COLORS */
    .column.erico .column-header { border-bottom-color: #d6ba9e; }
    .column.erico .column-header h2 { color: #d6ba9e; }

    .column.humberto .column-header { border-bottom-color: #3498db; }
    .column.humberto .column-header h2 { color: #3498db; }

    .column.gabrielle .column-header { border-bottom-color: #e74c3c; }
    .column.gabrielle .column-header h2 { color: #e74c3c; }

    /* TABLE */
    .table-wrapper {
      flex: 1;
      overflow-y: auto;
      overflow-x: auto;
      padding: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 10px;
    }

    thead {
      position: sticky;
      top: 0;
      background: #0d0d0f;
      border-bottom: 2px solid #333;
    }

    th {
      padding: 8px;
      text-align: left;
      font-weight: bold;
      color: #3498db;
      white-space: nowrap;
      border: 1px solid #333;
    }

    td {
      padding: 8px;
      border: 1px solid #333;
      word-break: break-word;
      max-width: 150px;
    }

    tr:hover {
      background: #252525;
    }

    tr:nth-child(even) {
      background: #1f1f1f;
    }

    .empty {
      text-align: center;
      color: #666;
      padding: 40px 20px;
      font-size: 11px;
    }

    /* SCROLLBAR */
    .table-wrapper::-webkit-scrollbar {
      width: 8px;
      height: 8px;
    }

    .table-wrapper::-webkit-scrollbar-track {
      background: #1a1a1a;
    }

    .table-wrapper::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 4px;
    }

    .table-wrapper::-webkit-scrollbar-thumb:hover {
      background: #444;
    }

    /* FOOTER */
    .footer {
      background: #0d0d0f;
      border-top: 2px solid #333;
      padding: 12px 20px;
      font-size: 11px;
      color: #999;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .footer-stats {
      display: flex;
      gap: 30px;
    }

    .footer-stat {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .footer-label {
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }

    .footer-value {
      color: #2ecc71;
      font-weight: bold;
    }

    .last-update {
      color: #666;
      font-size: 10px;
    }

    /* RESPONSIVE */
    @media (max-width: 1400px) {
      .content {
        grid-template-columns: 1fr;
      }

      .column {
        border-right: none;
        border-bottom: 1px solid #333;
      }

      table {
        font-size: 9px;
      }

      td {
        max-width: 100px;
        padding: 6px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <!-- HEADER -->
    <div class="header">
      <h1>🔴 NICO MONITOR</h1>
      <div class="header-controls">
        <div class="status-indicator">
          <span class="status-dot" id="status-dot"></span>
          <span id="status-text">Status: 🟢 Online</span>
        </div>
        <button class="btn" id="refresh-btn" onclick="loadMessages()">
          🔄 Refresh
        </button>
      </div>
    </div>

    <!-- MAIN CONTENT -->
    <div class="content">
      <!-- ERICO -->
      <div class="column erico">
        <div class="column-header">
          <h2>👨 ERICO</h2>
          <div class="stats">
            <div class="stat-item">
              <span class="stat-label">Total</span>
              <span class="stat-value" id="erico-total">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Última</span>
              <span class="stat-value" id="erico-last">—</span>
            </div>
          </div>
        </div>
        <div class="table-wrapper" id="erico-table-wrapper">
          <div class="empty">Carregando...</div>
        </div>
      </div>

      <!-- HUMBERTO -->
      <div class="column humberto">
        <div class="column-header">
          <h2>👨 HUMBERTO</h2>
          <div class="stats">
            <div class="stat-item">
              <span class="stat-label">Total</span>
              <span class="stat-value" id="humberto-total">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Última</span>
              <span class="stat-value" id="humberto-last">—</span>
            </div>
          </div>
        </div>
        <div class="table-wrapper" id="humberto-table-wrapper">
          <div class="empty">Carregando...</div>
        </div>
      </div>

      <!-- GABRIELLE -->
      <div class="column gabrielle">
        <div class="column-header">
          <h2>👩 GABRIELLE</h2>
          <div class="stats">
            <div class="stat-item">
              <span class="stat-label">Total</span>
              <span class="stat-value" id="gabrielle-total">0</span>
            </div>
            <div class="stat-item">
              <span class="stat-label">Última</span>
              <span class="stat-value" id="gabrielle-last">—</span>
            </div>
          </div>
        </div>
        <div class="table-wrapper" id="gabrielle-table-wrapper">
          <div class="empty">Carregando...</div>
        </div>
      </div>
    </div>

    <!-- FOOTER -->
    <div class="footer">
      <div class="footer-stats">
        <div class="footer-stat">
          <span class="footer-label">Total Geral</span>
          <span class="footer-value" id="footer-total">0 msgs</span>
        </div>
        <div class="footer-stat">
          <span class="footer-label">Erico</span>
          <span class="footer-value" id="footer-erico">0</span>
        </div>
        <div class="footer-stat">
          <span class="footer-label">Humberto</span>
          <span class="footer-value" id="footer-humberto">0</span>
        </div>
        <div class="footer-stat">
          <span class="footer-label">Gabrielle</span>
          <span class="footer-value" id="footer-gabrielle">0</span>
        </div>
      </div>
      <div class="last-update">
        Última atualização: <span id="last-update-time">—</span>
      </div>
    </div>
  </div>

  <script>
    const state = {
      erico: [],
      humberto: [],
      gabrielle: []
    };

    function formatDate(timestamp) {
      if (!timestamp) return '—';
      const date = new Date(timestamp);
      return date.toLocaleString('pt-BR', {
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit'
      });
    }

    function formatTimeAgo(timestamp) {
      if (!timestamp) return '—';
      const now = Date.now();
      const diff = Math.floor((now - timestamp) / 1000);

      if (diff < 60) return `${diff}s atrás`;
      if (diff < 3600) return `${Math.floor(diff / 60)}m atrás`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h atrás`;
      return `${Math.floor(diff / 86400)}d atrás`;
    }

    function renderTable(client, messages) {
      const wrapper = document.getElementById(`${client}-table-wrapper`);

      if (!messages || messages.length === 0) {
        wrapper.innerHTML = '<div class="empty">Nenhuma mensagem encontrada</div>';
        return;
      }

      const columns = Object.keys(messages[0]);
      const html = `
        <table>
          <thead>
            <tr>
              ${columns.map(col => `<th>${col}</th>`).join('')}
            </tr>
          </thead>
          <tbody>
            ${messages.map(msg => `
              <tr>
                ${columns.map(col => {
                  let value = msg[col];
                  if (col.includes('timestamp') && typeof value === 'number') {
                    value = formatDate(value);
                  }
                  return `<td title="${value}">${value || '—'}</td>`;
                }).join('')}
              </tr>
            `).join('')}
          </tbody>
        </table>
      `;

      wrapper.innerHTML = html;
    }

    function updateStats() {
      const ericoCount = state.erico.length;
      const humbertoCount = state.humberto.length;
      const gabrielleCount = state.gabrielle.length;
      const total = ericoCount + humbertoCount + gabrielleCount;

      document.getElementById('erico-total').textContent = ericoCount;
      document.getElementById('humberto-total').textContent = humbertoCount;
      document.getElementById('gabrielle-total').textContent = gabrielleCount;

      document.getElementById('erico-last').textContent = state.erico[0]
        ? formatTimeAgo(state.erico[0].timestamp)
        : '—';
      document.getElementById('humberto-last').textContent = state.humberto[0]
        ? formatTimeAgo(state.humberto[0].timestamp)
        : '—';
      document.getElementById('gabrielle-last').textContent = state.gabrielle[0]
        ? formatTimeAgo(state.gabrielle[0].timestamp)
        : '—';

      document.getElementById('footer-total').textContent = `${total} msgs`;
      document.getElementById('footer-erico').textContent = ericoCount;
      document.getElementById('footer-humberto').textContent = humbertoCount;
      document.getElementById('footer-gabrielle').textContent = gabrielleCount;

      document.getElementById('last-update-time').textContent = new Date().toLocaleTimeString('pt-BR');
    }

    async function loadMessages() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      btn.disabled = true;

      try {
        const response = await fetch('/api/monitor/messages?limit=10');
        const data = await response.json();

        state.erico = data.erico || [];
        state.humberto = data.humberto || [];
        state.gabrielle = data.gabrielle || [];

        renderTable('erico', state.erico);
        renderTable('humberto', state.humberto);
        renderTable('gabrielle', state.gabrielle);

        updateStats();
      } catch (err) {
        console.error('Load error:', err);
        document.getElementById('status-dot').classList.add('offline');
        document.getElementById('status-text').textContent = 'Status: 🔴 Erro ao carregar';
      } finally {
        btn.classList.remove('loading');
        btn.disabled = false;
      }
    }

    // Auto-refresh a cada 5 segundos
    setInterval(loadMessages, 5000);

    // Atualizar "última" a cada segundo
    setInterval(updateStats, 1000);

    // Carregar na inicialização
    loadMessages();
  </script>
</body>
</html>
