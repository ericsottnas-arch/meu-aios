<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🔴 Nico Monitor - Professional Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      /* ── DS Backgrounds ── */
      --bg-base: #030303;
      --bg-surface: #0a0a0a;
      --bg-elevated: #101013;
      --bg-overlay: #18181d;
      /* ── DS Borders ── */
      --border-faint: #141417;
      --border-subtle: #1e1e23;
      --border-base: #27272d;
      --border-strong: #35353c;
      /* ── DS Text ── */
      --text-primary: #F0F0F5;
      --text-secondary: #8F8FA0;
      --text-muted: #505060;
      /* ── DS Accent ── */
      --accent: #C8FF00;
      --accent-dim: rgba(200, 255, 0, 0.08);
      --accent-glow: rgba(200, 255, 0, 0.22);
      /* ── DS Semantic ── */
      --success: #22C55E;
      --success-bg: rgba(34, 197, 94, 0.10);
      --warning: #F59E0B;
      --danger: #EF4444;
      /* ── DS Typography ── */
      --font-display: 'Space Grotesk', 'Inter', system-ui, sans-serif;
      --font-body: 'Inter', system-ui, -apple-system, sans-serif;
      --font-mono: 'JetBrains Mono', 'Fira Code', monospace;
      /* ── DS Radius ── */
      --r-xs: 3px; --r-sm: 6px; --r-md: 8px; --r-lg: 12px; --r-full: 9999px;
      /* ── DS Transitions ── */
      --ease-fast: 120ms cubic-bezier(0.4, 0, 0.2, 1);
      --ease-base: 200ms cubic-bezier(0.4, 0, 0.2, 1);
      /* ── Client Colors (page-specific) ── */
      --erico: #d6ba9e;
      --humberto: #3b82f6;
      --gabrielle: #ef4444;
      --vanessa: #8b5cf6;
      --torre1: #f59e0b;
      --fourcred: #06b6d4;
      --prof-humberto: #ec4899;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg-base);
      color: var(--text-primary);
      line-height: 1.5;
      font-size: 12px;
      -webkit-font-smoothing: antialiased;
    }

    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
      max-width: 1600px;
      margin: 0 auto;
    }

    .header {
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-base);
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .header-title {
      font-size: 14px;
      font-weight: bold;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      padding: 6px 12px;
      background: var(--bg-elevated);
      border: 1px solid var(--border-base);
      border-radius: var(--r-xs);
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--success);
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.6; }
    }

    .main {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .tabs {
      display: flex;
      gap: 12px;
      border-bottom: 1px solid var(--border-base);
      padding-bottom: 12px;
    }

    .tab-btn {
      padding: 8px 16px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      font-size: 12px;
      transition: all var(--ease-base);
    }

    .tab-btn.active {
      color: var(--text-primary);
      border-bottom-color: var(--success);
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 12px;
    }

    .card {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-sm);
      padding: 16px;
      transition: all var(--ease-base);
    }

    .card:hover {
      border-color: var(--accent);
      box-shadow: 0 0 10px rgba(6, 182, 212, 0.1);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border-base);
    }

    .card-title {
      font-size: 13px;
      font-weight: bold;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .client-badge {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      display: inline-block;
    }

    .badge-erico { background: var(--erico); }
    .badge-humberto { background: var(--humberto); }
    .badge-gabrielle { background: var(--gabrielle); }
    .badge-vanessa { background: var(--vanessa); }
    .badge-torre1 { background: var(--torre1); }
    .badge-fourcred { background: var(--fourcred); }
    .badge-prof-humberto { background: var(--prof-humberto); }

    .message-count {
      font-size: 20px;
      font-weight: bold;
      color: var(--accent);
    }

    .feed {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .message-item {
      padding: 8px;
      background: var(--bg-elevated);
      border-left: 3px solid var(--border-base);
      border-radius: var(--r-xs);
      transition: opacity var(--ease-base);
    }

    .message-time {
      font-size: 10px;
      color: var(--text-secondary);
      margin-bottom: 2px;
    }

    .message-sender {
      font-size: 11px;
      font-weight: bold;
      color: var(--accent);
      margin-bottom: 2px;
    }

    .message-text {
      font-size: 11px;
      color: var(--text-primary);
      word-break: break-word;
    }

    .message-meta {
      display: flex;
      gap: 8px;
      margin-top: 4px;
      font-size: 10px;
    }

    .urgency-badge {
      padding: 2px 6px;
      border-radius: var(--r-xs);
      font-weight: bold;
    }

    .urgency-critical {
      background: #dc2626;
      color: white;
    }

    .urgency-high {
      background: #f97316;
      color: white;
    }

    .urgency-medium {
      background: #eab308;
      color: black;
    }

    .urgency-low {
      background: #6b7280;
      color: white;
    }

    .analytics-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
      gap: 12px;
    }

    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border-base);
      border-radius: var(--r-sm);
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text-secondary);
      margin-bottom: 6px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: bold;
      color: var(--accent);
    }

    .urgency-breakdown {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }

    .urgency-bar {
      flex: 1;
      height: 24px;
      border-radius: var(--r-xs);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 10px;
      font-weight: bold;
    }

    .footer {
      background: var(--bg-surface);
      border-top: 1px solid var(--border-base);
      padding: 12px 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 11px;
      color: var(--text-secondary);
    }

    @media (max-width: 768px) {
      .grid {
        grid-template-columns: 1fr;
      }
      .header {
        flex-direction: column;
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="header-title">
        <span>🔴 Nico Monitor</span>
        <div class="status-badge">
          <div class="status-dot"></div>
          <span id="status">Online</span>
        </div>
      </div>
      <div id="lastUpdate" class="status-badge">
        Atualizado agora
      </div>
    </div>

    <div class="main">
      <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('clients')">Clientes</button>
        <button class="tab-btn" onclick="switchTab('analytics')">Analytics</button>
      </div>

      <div id="clients" class="tab-content active">
        <div class="grid" id="clientsGrid"></div>
      </div>

      <div id="analytics" class="tab-content">
        <div class="analytics-grid" id="analyticsGrid"></div>
      </div>
    </div>

    <div class="footer">
      <span id="totalMsg">Total: 0 mensagens</span>
      <span id="time"></span>
    </div>
  </div>

  <script>
    const CLIENTS = ['erico', 'humberto', 'gabrielle', 'vanessa', 'torre1', 'fourcred', 'prof-humberto'];
    const COLORS = {
      'erico': '#d6ba9e',
      'humberto': '#3b82f6',
      'gabrielle': '#ef4444',
      'vanessa': '#8b5cf6',
      'torre1': '#f59e0b',
      'fourcred': '#06b6d4',
      'prof-humberto': '#ec4899'
    };

    let clientData = {};
    let analyticsData = {};

    function switchTab(tab) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
      document.getElementById(tab).classList.add('active');
      event.target.classList.add('active');
    }

    async function updateData() {
      try {
        // Fetch messages
        const msgRes = await fetch('/api/monitor/messages');
        const msgData = await msgRes.json();
        clientData = msgData;

        // Fetch analytics
        const analyticsRes = await fetch('/api/monitor/analytics/summary');
        const analyticsData = await analyticsRes.json();

        renderClients(msgData);
        renderAnalytics(analyticsData);

        // Update timestamp
        const now = new Date();
        document.getElementById('time').textContent = now.toLocaleTimeString('pt-BR');
        document.getElementById('lastUpdate').textContent = 'Atualizado ' + timeAgo(now);

        // Calculate total
        const total = Object.values(msgData.totals || {}).reduce((a, b) => a + b, 0);
        document.getElementById('totalMsg').textContent = `Total: ${total} mensagens`;
      } catch (err) {
        console.error('Erro ao atualizar:', err);
      }
    }

    function renderClients(data) {
      const grid = document.getElementById('clientsGrid');

      // Build all HTML at once instead of += repeatedly
      let html = '';
      CLIENTS.forEach(client => {
        const messages = data[client] || [];
        const total = data.totals?.[client] || 0;

        html += `
          <div class="card">
            <div class="card-header">
              <div class="card-title">
                <span class="client-badge badge-${client}"></span>
                ${formatClientName(client)}
              </div>
              <div class="message-count">${total}</div>
            </div>

            <div class="feed">
              ${messages.length === 0 ? '<div class="message-item">Nenhuma mensagem</div>' : ''}
              ${messages.slice(-5).reverse().map(msg => `
                <div class="message-item">
                  <div class="message-time">${formatTime(msg.timestamp)}</div>
                  <div class="message-sender">${msg.push_name || 'Unknown'}</div>
                  <div class="message-text">${escapeHtml(msg.content?.substring(0, 60) || '[Sem conteúdo]')}</div>
                  <div class="message-meta">
                    <span class="urgency-badge urgency-${getUrgencyLevel(msg.urgency_score)}">${getUrgencyLevel(msg.urgency_score).toUpperCase()}</span>
                  </div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      });

      // Single innerHTML assignment instead of += loop
      grid.innerHTML = html;
    }

    function renderAnalytics(data) {
      const grid = document.getElementById('analyticsGrid');

      const summary = data.summary || {};
      const clients = data.clients || {};

      // Build all HTML at once
      let html = `
        <div class="stat-card">
          <div class="stat-label">RESUMO GERAL</div>
          <div class="stat-value">${summary.totalMessages || 0}</div>
          <div style="font-size: 11px; color: var(--text-secondary); margin-top: 8px;">
            Críticas: <span style="color: #dc2626;">${summary.criticalCount || 0}</span><br>
            Reclamações: <span style="color: #f97316;">${summary.complaintCount || 0}</span><br>
            Taxa Crítica: <span style="color: var(--accent);">${summary.avgCriticalityRate || '0%'}</span>
          </div>
        </div>
      `;

      // Client stats
      CLIENTS.forEach(client => {
        const stats = clients[client] || {};
        html += `
          <div class="stat-card">
            <div class="stat-label" style="color: ${COLORS[client]};">${formatClientName(client)}</div>
            <div class="stat-value">${stats.totalMessages || 0}</div>
            <div style="font-size: 10px; color: var(--text-secondary); margin-top: 8px;">
              Críticas: ${stats.criticalCount || 0}<br>
              Reclamações: ${stats.complaintCount || 0}
            </div>
          </div>
        `;
      });

      // Single innerHTML assignment
      grid.innerHTML = html;
    }

    function formatClientName(name) {
      const names = {
        'erico': 'Dr. Erico Servano',
        'humberto': 'Dr. Humberto',
        'gabrielle': 'Dra. Gabrielle',
        'vanessa': 'Dra. Vanessa',
        'torre1': 'Torre 1',
        'fourcred': 'Fourcred',
        'prof-humberto': 'Prof. Dr. Humberto'
      };
      return names[name] || name;
    }

    function formatTime(ts) {
      if (!ts) return '—';
      const date = new Date(ts);
      const hours = String(date.getHours()).padStart(2, '0');
      const mins = String(date.getMinutes()).padStart(2, '0');
      return `${hours}:${mins}`;
    }

    function timeAgo(date) {
      const secs = Math.floor((new Date() - date) / 1000);
      if (secs < 60) return 'agora';
      const mins = Math.floor(secs / 60);
      if (mins < 60) return `${mins}m atrás`;
      const hours = Math.floor(mins / 60);
      if (hours < 24) return `${hours}h atrás`;
      return date.toLocaleDateString('pt-BR');
    }

    function getUrgencyLevel(score) {
      score = score || 0;
      if (score >= 70) return 'critical';
      if (score >= 50) return 'high';
      if (score >= 30) return 'medium';
      return 'low';
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // SSE for real-time updates
    function connectSSE() {
      const eventSource = new EventSource('/api/monitor/stream');
      
      eventSource.onmessage = (event) => {
        console.log('📨 New message:', event.data);
        updateData();
      };

      eventSource.onerror = () => {
        console.error('SSE connection error');
        eventSource.close();
        setTimeout(connectSSE, 3000);
      };
    }

    // Initial load and periodic updates
    updateData();
    setInterval(updateData, 5000); // Update every 5 seconds (smooth)
    connectSSE();
  </script>
</body>
</html>
