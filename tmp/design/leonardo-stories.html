<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Leonardo Portfolio - Stories</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@900&family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 1080px;
            height: 1920px;
            background: linear-gradient(135deg, #0d0d0f 0%, #1a1a1c 100%);
            font-family: 'Montserrat', sans-serif;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Container principal */
        .container {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* Seção de fotos (antes/depois) */
        .photo-section {
            flex: 0 0 auto;
            padding: 40px 30px;
            position: relative;
        }

        .before-after-wrapper {
            display: flex;
            gap: 20px;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .photo-container {
            flex: 1;
            position: relative;
            max-width: 380px;
            aspect-ratio: 9/11;
        }

        .photo-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 0;
            display: block;
            filter: brightness(0.95) contrast(1.05);
        }

        /* SVG para contorno da mandíbula */
        .contour-svg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        /* Labels ANTES/DEPOIS */
        .label {
            position: absolute;
            font-family: 'Montserrat', sans-serif;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            color: rgba(245, 240, 235, 0.9);
            letter-spacing: 4px;
            top: 20px;
            z-index: 10;
        }

        .label-antes {
            left: 20px;
        }

        .label-depois {
            right: 20px;
        }

        /* Divisor central */
        .divider {
            width: 1px;
            height: 300px;
            background: rgba(255, 255, 255, 0.2);
            margin: 0 5px;
        }

        /* Seção de texto */
        .text-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 60px 40px;
            text-align: center;
            gap: 30px;
        }

        /* Título principal */
        .title {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            font-weight: 900;
            font-style: italic;
            color: #f5f0eb;
            line-height: 1;
            letter-spacing: -2px;
            margin-bottom: 20px;
            text-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Texto de oferta */
        .offer-text {
            font-family: 'Montserrat', sans-serif;
            font-size: 24px;
            font-weight: 600;
            color: #f5f0eb;
            line-height: 1.4;
            letter-spacing: 0.5px;
            margin-bottom: 20px;
        }

        /* CTA */
        .cta {
            font-family: 'Montserrat', sans-serif;
            font-size: 18px;
            font-weight: 700;
            text-transform: uppercase;
            color: #d6ba9e;
            letter-spacing: 3px;
            padding: 16px 32px;
            border: 2px solid rgba(214, 186, 158, 0.4);
            border-radius: 0;
            background: rgba(13, 13, 15, 0.6);
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .cta:hover {
            border-color: rgba(214, 186, 158, 0.8);
            background: rgba(13, 13, 15, 0.8);
        }

        /* Vignette efeito */
        .vignette {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.4) 100%);
            z-index: 5;
        }

        /* Glow effect atrás da foto */
        .glow-layer {
            position: absolute;
            top: -20px;
            left: -20px;
            right: -20px;
            bottom: -20px;
            background: radial-gradient(circle at center, rgba(255, 255, 255, 0.05) 0%, transparent 70%);
            filter: blur(30px);
            z-index: 1;
            border-radius: 50%;
        }

        /* Breakpoint mobile */
        @media (max-width: 1080px) {
            .title {
                font-size: 56px;
            }
            .offer-text {
                font-size: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Seção de fotos -->
        <div class="photo-section">
            <div class="before-after-wrapper">
                <!-- FOTO ANTES -->
                <div class="photo-container">
                    <div class="glow-layer"></div>
                    <img src="file:///Users/ericsantos/meu-aios/tmp/design/antes.jpg" alt="Antes">
                    <div class="label label-antes">ANTES</div>
                    <svg class="contour-svg" viewBox="0 0 380 450" preserveAspectRatio="none">
                        <!-- Contorno sutil (ANTES não tem linhas destacadas) -->
                    </svg>
                    <div class="vignette"></div>
                </div>

                <!-- DIVISOR -->
                <div class="divider"></div>

                <!-- FOTO DEPOIS -->
                <div class="photo-container">
                    <div class="glow-layer"></div>
                    <img src="file:///Users/ericsantos/meu-aios/tmp/design/depois.jpg" alt="Depois">
                    <div class="label label-depois">DEPOIS</div>
                    <!-- SVG com contorno pontilhado da mandíbula -->
                    <svg class="contour-svg" viewBox="0 0 100 100" preserveAspectRatio="none">
                        <defs>
                            <filter id="glow-filter-mandible">
                                <feGaussianBlur stdDeviation="0.8" result="coloredBlur"/>
                                <feMerge>
                                    <feMergeNode in="coloredBlur"/>
                                    <feMergeNode in="SourceGraphic"/>
                                </feMerge>
                            </filter>
                        </defs>

                        <!-- Contorno da MANDÍBULA - linha pontilhada branca DESTACADA -->
                        <!-- Mapeado para coordenadas 0-100 (normalizado) -->
                        <!-- Ângulo esquerda (x=20, y=50) → Queixo (x=50, y=72) → Ângulo direita (x=80, y=50) -->
                        <path d="M 18 48 Q 35 72 50 75 Q 65 72 82 48"
                              stroke="rgba(255, 255, 255, 0.65)"
                              stroke-width="3"
                              fill="none"
                              stroke-linecap="round"
                              stroke-linejoin="round"
                              stroke-dasharray="3,5"
                              filter="url(#glow-filter-mandible)"/>
                    </svg>
                    <div class="vignette"></div>
                </div>
            </div>
        </div>

        <!-- Seção de texto -->
        <div class="text-section">
            <div>
                <h1 class="title">PACIENTE<br>PORTFÓLIO</h1>
                <p class="offer-text">Você paga apenas o custo dos materiais</p>
            </div>
            <button class="cta">Envie "Eu quero" para confirmar</button>
        </div>

        <!-- Vignette geral na tela -->
        <div class="vignette"></div>
    </div>
</body>
</html>
