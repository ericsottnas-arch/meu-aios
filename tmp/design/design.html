<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,800;0,900;1,400&family=Montserrat:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1920px;
    background: #1a1a1c;
    font-family: 'Montserrat', sans-serif;
    color: #fff;
    overflow: hidden;
    position: relative;
  }

  /* ====== PHOTOS ====== */
  .photos-container {
    position: absolute;
    top: 70px;
    left: 0;
    width: 100%;
    height: 1150px;
    display: flex;
    overflow: hidden;
  }

  .photo-side {
    width: 50%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .photo-side img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    filter: brightness(0.88) contrast(1.1);
  }

  /* Vignette */
  .photo-side::after {
    content: '';
    position: absolute;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(
      ellipse 80% 60% at 50% 30%,
      transparent 0%,
      rgba(26,26,28,0.08) 40%,
      rgba(26,26,28,0.35) 70%,
      rgba(26,26,28,0.85) 100%
    );
    z-index: 2;
  }

  /* Divider */
  .divider {
    position: absolute;
    top: 70px;
    left: 50%;
    width: 1px;
    height: 1150px;
    background: rgba(255,255,255,0.08);
    z-index: 15;
  }

  /* Labels */
  .label {
    position: absolute;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 11px;
    letter-spacing: 3.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,0.45);
    z-index: 20;
  }
  .label-antes { top: 100px; left: 50px; }
  .label-depois { top: 100px; right: 50px; }

  /* ====== CONTOUR LINES ====== */
  /*
    RULE: Lines trace the OUTSIDE contour of the jawline.
    They should follow the silhouette edge, not cross over the face.
    For frontal view: lines go along the outer jaw edge from ear to chin.
  */
  .contour-overlay {
    position: absolute;
    top: 70px;
    left: 50%;
    width: 50%;
    height: 1150px;
    z-index: 10;
    pointer-events: none;
  }

  .contour-overlay svg {
    width: 100%;
    height: 100%;
  }

  /* ====== GRADIENT FADE ====== */
  .gradient-overlay {
    position: absolute;
    top: 70px; left: 0;
    width: 100%;
    height: 1150px;
    background: linear-gradient(
      to bottom,
      rgba(26,26,28,0.2) 0%,
      transparent 5%,
      transparent 55%,
      rgba(26,26,28,0.35) 70%,
      rgba(26,26,28,0.85) 85%,
      #1a1a1c 100%
    );
    z-index: 5;
  }

  /* Circle callout removed - using contour lines only (cleaner, per reference) */

  /* ====== BRAND BAR TOP ====== */
  .brand-bar {
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 30;
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(214, 186, 158, 0.6);
    white-space: nowrap;
  }
  .brand-bar span {
    color: rgba(214, 186, 158, 0.85);
    font-weight: 600;
  }

  /* ====== TEXT SECTION ====== */
  .text-section {
    position: absolute;
    top: 1120px;
    left: 0;
    width: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 0 50px;
    text-align: center;
    z-index: 30;
  }

  .subtitle-top {
    font-family: 'Montserrat', sans-serif;
    font-weight: 400;
    font-size: 17px;
    letter-spacing: 7px;
    text-transform: uppercase;
    color: rgba(214, 186, 158, 0.85);
    margin-bottom: 24px;
  }

  .main-title {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.92;
    color: #f5f0eb;
    letter-spacing: -1px;
    text-transform: uppercase;
    margin-bottom: 14px;
  }

  .main-title-line2 {
    font-family: 'Playfair Display', serif;
    font-weight: 900;
    font-size: 96px;
    line-height: 0.92;
    color: #f5f0eb;
    letter-spacing: -1px;
    text-transform: uppercase;
    margin-bottom: 50px;
  }

  .offer-text {
    font-family: 'Montserrat', sans-serif;
    font-weight: 300;
    font-size: 24px;
    color: rgba(255,255,255,0.72);
    margin-bottom: 40px;
    line-height: 1.6;
  }
  .offer-text strong {
    font-weight: 600;
    color: rgba(255,255,255,0.95);
  }

  .cta-button {
    padding: 20px 48px;
    border: 1.2px solid rgba(255,255,255,0.38);
    border-radius: 50px;
    font-family: 'Montserrat', sans-serif;
    font-weight: 500;
    font-size: 20px;
    letter-spacing: 0.5px;
    color: #f0ebe5;
    background: rgba(255,255,255,0.05);
  }
</style>
</head>
<body>

  <!-- Brand bar top -->
  <div class="brand-bar">
    // Dra Vanessa Soares &nbsp;|&nbsp; <span>Harmoniza&ccedil;&atilde;o Orofacial</span>
  </div>

  <!-- Photos (aligned, same face size) -->
  <div class="photos-container">
    <div class="photo-side">
      <img src="antes_aligned.jpg" alt="Antes">
    </div>
    <div class="photo-side">
      <img src="depois_aligned.jpg" alt="Depois">
    </div>

    <!--
      CONTOUR LINES: trace OUTSIDE the jawline silhouette.
      These lines follow the OUTER EDGE of the jaw, not across the face.
      Think of it as drawing the jaw silhouette from outside.
    -->
    <div class="contour-overlay">
      <svg viewBox="0 0 540 1020" xmlns="http://www.w3.org/2000/svg">
        <!--
          The face takes up roughly the center of each photo half.
          In the right (depois) half, the face edge (jaw line) is approximately:
          - Right jaw angle: near x=430, y=340 (outer edge of face)
          - Chin: near x=270, y=570
          - Left jaw angle: near x=100, y=360

          Lines trace just OUTSIDE these points, forming the jawline silhouette.
        -->

        <!--
          OUTER SILHOUETTE CONTOUR:
          These lines trace the EDGE of the face where it meets the dark background.
          The face silhouette in the depois photo (right half, viewBox 540px wide):
          - Right ear/jaw angle edge: ~x=470, y=310
          - Right jaw outer edge: curves from ear down to chin
          - Chin bottom: ~x=270, y=595
          - Left jaw outer edge: curves from chin up to left ear area
          - Left edge: ~x=70, y=340
        -->

        <!-- RIGHT SILHOUETTE: ear → jaw angle → chin (following face border) -->
        <path d="M 475,290 C 472,320 468,355 460,385 C 450,418 432,452 408,480 C 382,510 350,540 320,560 C 298,575 278,588 270,595"
              fill="none"
              stroke="rgba(255,255,255,0.52)"
              stroke-width="1.8"
              stroke-dasharray="2.5,4.5"
              stroke-linecap="round" />

        <!-- LEFT SILHOUETTE: chin → left jaw angle (following face border) -->
        <path d="M 270,595 C 258,588 238,575 215,558 C 185,535 158,508 138,478 C 118,448 105,418 95,385 C 88,358 82,332 78,310"
              fill="none"
              stroke="rgba(255,255,255,0.52)"
              stroke-width="1.8"
              stroke-dasharray="2.5,4.5"
              stroke-linecap="round" />

        <!-- Chin marker -->
        <circle cx="270" cy="597" r="3.5" fill="none" stroke="rgba(255,255,255,0.3)" stroke-width="0.8" />
        <circle cx="270" cy="597" r="1.2" fill="rgba(255,255,255,0.3)" />

        <!-- Right jaw angle marker -->
        <circle cx="475" cy="290" r="2.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7" />

        <!-- Left jaw angle marker -->
        <circle cx="78" cy="310" r="2.5" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="0.7" />

        <!-- Subtle glow -->
        <path d="M 475,290 C 472,320 468,355 460,385 C 450,418 432,452 408,480 C 382,510 350,540 320,560 C 298,575 278,588 270,595"
              fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="5" stroke-linecap="round" />
        <path d="M 270,595 C 258,588 238,575 215,558 C 185,535 158,508 138,478 C 118,448 105,418 95,385 C 88,358 82,332 78,310"
              fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="5" stroke-linecap="round" />
      </svg>
    </div>
  </div>

  <!-- Labels -->
  <div class="label label-antes">Antes</div>
  <div class="label label-depois">Depois</div>

  <!-- Divider -->
  <div class="divider"></div>

  <!-- Gradient -->
  <div class="gradient-overlay"></div>

  <!-- Text -->
  <div class="text-section">
    <div class="subtitle-top">Paciente Portf&oacute;lio</div>
    <div class="main-title">Harmoniza&ccedil;&atilde;o</div>
    <div class="main-title-line2">Facial</div>
    <div class="offer-text">Voc&ecirc; paga apenas o <strong>custo dos materiais</strong></div>
    <div class="cta-button">Envie &ldquo;Eu quero&rdquo; para confirmar</div>
  </div>

</body>
</html>
